<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="50%" stop-color="#F4EFE6"/>
      <stop offset="100%" stop-color="#EDE5D5"/>
    </linearGradient>
        <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="1"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#0A0A0A" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <!-- Abstract node graph - sparse and elegant -->
    <!-- Large nodes -->
    <circle cx="220" cy="280" r="18" fill="none" stroke="#0A0A0A" stroke-width="0.7" opacity="0.2"/>
    <circle cx="220" cy="280" r="3" fill="#0A0A0A" opacity="0.35"/>
    <circle cx="520" cy="220" r="14" fill="none" stroke="#A0522D" stroke-width="0.6" opacity="0.2"/>
    <circle cx="520" cy="220" r="2.5" fill="#A0522D" opacity="0.4"/>
    <circle cx="400" cy="420" r="22" fill="none" stroke="#0A0A0A" stroke-width="0.8" opacity="0.22"/>
    <circle cx="400" cy="420" r="4" fill="#A0522D" opacity="0.45"/>
    <circle cx="600" cy="480" r="16" fill="none" stroke="#0A0A0A" stroke-width="0.6" opacity="0.18"/>
    <circle cx="600" cy="480" r="2.5" fill="#0A0A0A" opacity="0.35"/>
    <circle cx="250" cy="560" r="12" fill="none" stroke="#A0522D" stroke-width="0.5" opacity="0.18"/>
    <circle cx="250" cy="560" r="2" fill="#A0522D" opacity="0.35"/>
    <circle cx="650" cy="320" r="10" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.15"/>
    <circle cx="650" cy="320" r="2" fill="#0A0A0A" opacity="0.3"/>
    <circle cx="160" cy="440" r="8" fill="none" stroke="#2D5016" stroke-width="0.5" opacity="0.18"/>
    <circle cx="160" cy="440" r="1.5" fill="#2D5016" opacity="0.35"/>
    <!-- Elegant bezier curves connecting nodes -->
    <path d="M238,280 Q370,200 506,220" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.15"/>
    <path d="M520,234 Q460,330 400,398" fill="none" stroke="#A0522D" stroke-width="0.5" opacity="0.15"/>
    <path d="M422,420 Q510,450 584,480" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.12"/>
    <path d="M220,298 Q210,380 250,548" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.1"/>
    <path d="M378,420 Q300,490 262,560" fill="none" stroke="#A0522D" stroke-width="0.4" opacity="0.12"/>
    <path d="M534,220 Q600,260 640,320" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.1"/>
    <path d="M650,330 Q630,400 600,464" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.1"/>
    <path d="M220,298 Q190,370 168,440" fill="none" stroke="#2D5016" stroke-width="0.35" opacity="0.1"/>
    <path d="M168,440 Q220,440 378,420" fill="none" stroke="#0A0A0A" stroke-width="0.35" opacity="0.08"/>
    <!-- Tiny satellite dots -->
    <circle cx="360" cy="250" r="1.5" fill="#0A0A0A" opacity="0.2"/>
    <circle cx="470" cy="350" r="1.5" fill="#A0522D" opacity="0.2"/>
    <circle cx="320" cy="480" r="1.5" fill="#0A0A0A" opacity="0.18"/>
    <circle cx="550" cy="380" r="1.5" fill="#0A0A0A" opacity="0.18"/>
    <circle cx="190" cy="350" r="1.5" fill="#2D5016" opacity="0.18"/>
  </g>
  <rect width="800" height="800" filter="url(#grain)" opacity="0.5"/>
</svg>