    <path d="M390,280 Q420,260 440,240" fill="none" stroke="#0A0A0A" stroke-width="0.3" opacity="0.08"/>
    <!-- Branch 6 - straight down -->
    <path d="M400,400 Q410,470 420,540" fill="none" stroke="#0A0A0A" stroke-width="0.6" opacity="0.15"/>
    <path d="M420,540 Q430,600 440,660" fill="none" stroke="#2D5016" stroke-width="0.4" opacity="0.1"/>
    <path d="M420,540 Q390,560 360,580" fill="none" stroke="#0A0A0A" stroke-width="0.3" opacity="0.08"/>
    <!-- Endpoint dots -->
    <circle cx="600" cy="200" r="2" fill="#0A0A0A" opacity="0.2"/>
    <circle cx="620" cy="360" r="1.5" fill="#A0522D" opacity="0.25"/>
