<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="50%" stop-color="#F4EFE6"/>
      <stop offset="100%" stop-color="#EDE5D5"/>
    </linearGradient>
        <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="1"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#0A0A0A" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <!-- Precise geometric composition -->
    <!-- Perfect circles -->
    <circle cx="400" cy="400" r="200" fill="none" stroke="#0A0A0A" stroke-width="0.6" opacity="0.2"/>
    <circle cx="400" cy="400" r="140" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.18"/>
    <circle cx="400" cy="400" r="80" fill="none" stroke="#A0522D" stroke-width="0.7" opacity="0.22"/>
    <!-- Intersecting lines through center -->
    <line x1="140" y1="400" x2="660" y2="400" stroke="#0A0A0A" stroke-width="0.4" opacity="0.15"/>
    <line x1="400" y1="140" x2="400" y2="660" stroke="#0A0A0A" stroke-width="0.4" opacity="0.15"/>
    <!-- 45-degree lines -->
    <line x1="216" y1="216" x2="584" y2="584" stroke="#0A0A0A" stroke-width="0.3" opacity="0.1"/>
    <line x1="584" y1="216" x2="216" y2="584" stroke="#0A0A0A" stroke-width="0.3" opacity="0.1"/>
    <!-- Precise angles - triangle inscribed -->
    <path d="M400,200 L573,500 L227,500 Z" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.12"/>
    <!-- Inverted triangle -->
    <path d="M400,600 L227,300 L573,300 Z" fill="none" stroke="#A0522D" stroke-width="0.4" opacity="0.1"/>
    <!-- Small precise squares -->
    <rect x="370" y="370" width="60" height="60" fill="none" stroke="#A0522D" stroke-width="0.6" opacity="0.2" transform="rotate(0 400 400)"/>
    <rect x="358" y="358" width="84" height="84" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.12" transform="rotate(45 400 400)"/>
    <!-- Accent points at intersections -->
    <circle cx="400" cy="200" r="3" fill="#0A0A0A" opacity="0.35"/>
    <circle cx="400" cy="600" r="3" fill="#0A0A0A" opacity="0.35"/>
    <circle cx="200" cy="400" r="3" fill="#0A0A0A" opacity="0.35"/>
    <circle cx="600" cy="400" r="3" fill="#0A0A0A" opacity="0.35"/>
    <circle cx="400" cy="400" r="3.5" fill="#A0522D" opacity="0.5"/>
    <!-- Corner intersection marks -->
    <circle cx="284" cy="284" r="2" fill="#0A0A0A" opacity="0.25"/>
    <circle cx="516" cy="284" r="2" fill="#0A0A0A" opacity="0.25"/>
    <circle cx="284" cy="516" r="2" fill="#0A0A0A" opacity="0.25"/>
    <circle cx="516" cy="516" r="2" fill="#0A0A0A" opacity="0.25"/>
    <!-- Outer frame lines suggesting precision -->
    <line x1="120" y1="120" x2="680" y2="120" stroke="#0A0A0A" stroke-width="0.2" opacity="0.06"/>
    <line x1="120" y1="680" x2="680" y2="680" stroke="#0A0A0A" stroke-width="0.2" opacity="0.06"/>
    <line x1="120" y1="120" x2="120" y2="680" stroke="#0A0A0A" stroke-width="0.2" opacity="0.06"/>
    <line x1="680" y1="120" x2="680" y2="680" stroke="#0A0A0A" stroke-width="0.2" opacity="0.06"/>
    <!-- Tangent lines from circles -->
    <line x1="260" y1="400" x2="200" y2="300" stroke="#0A0A0A" stroke-width="0.2" opacity="0.08"/>
    <line x1="540" y1="400" x2="600" y2="300" stroke="#0A0A0A" stroke-width="0.2" opacity="0.08"/>
    <line x1="260" y1="400" x2="200" y2="500" stroke="#0A0A0A" stroke-width="0.2" opacity="0.08"/>
    <line x1="540" y1="400" x2="600" y2="500" stroke="#0A0A0A" stroke-width="0.2" opacity="0.08"/>
  </g>
  <rect width="800" height="800" filter="url(#grain)" opacity="0.5"/>
</svg>