<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="50%" stop-color="#F4EFE6"/>
      <stop offset="100%" stop-color="#EDE5D5"/>
    </linearGradient>
        <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="1"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#0A0A0A" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="divider" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0522D" stop-opacity="0"/>
      <stop offset="30%" stop-color="#A0522D" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#A0522D" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#A0522D" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <!-- Split composition: scattered left, organized right -->
    <!-- Center divider -->
    <line x1="400" y1="140" x2="400" y2="660" stroke="url(#divider)" stroke-width="0.8"/>
    <!-- LEFT SIDE: scattered, organic elements -->
    <circle cx="120" cy="230" r="8" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
    <circle cx="280" cy="190" r="5" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.18"/>
    <circle cx="180" cy="380" r="12" fill="none" stroke="#A0522D" stroke-width="0.5" opacity="0.15"/>
    <circle cx="310" cy="320" r="6" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.18"/>
    <circle cx="140" cy="520" r="9" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.15"/>
    <circle cx="250" cy="480" r="4" fill="none" stroke="#2D5016" stroke-width="0.4" opacity="0.2"/>
    <circle cx="320" cy="580" r="7" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.15"/>
    <circle cx="200" cy="620" r="3" fill="none" stroke="#A0522D" stroke-width="0.4" opacity="0.18"/>
    <circle cx="90" cy="440" r="5" fill="none" stroke="#0A0A0A" stroke-width="0.3" opacity="0.12"/>
    <circle cx="350" cy="420" r="10" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.15"/>
    <!-- Scattered dots left -->
    <circle cx="120" cy="230" r="2" fill="#0A0A0A" opacity="0.25"/>
    <circle cx="280" cy="190" r="1.5" fill="#0A0A0A" opacity="0.2"/>
    <circle cx="180" cy="380" r="2.5" fill="#A0522D" opacity="0.25"/>
    <circle cx="310" cy="320" r="1.5" fill="#0A0A0A" opacity="0.2"/>
    <circle cx="140" cy="520" r="2" fill="#0A0A0A" opacity="0.22"/>
    <circle cx="250" cy="480" r="1.5" fill="#2D5016" opacity="0.25"/>
    <circle cx="320" cy="580" r="1.5" fill="#0A0A0A" opacity="0.2"/>
    <!-- Random connecting lines left side -->
    <path d="M120,230 Q200,200 280,190" fill="none" stroke="#0A0A0A" stroke-width="0.25" opacity="0.08"/>
    <path d="M180,380 Q250,350 310,320" fill="none" stroke="#0A0A0A" stroke-width="0.3" opacity="0.08"/>
    <path d="M140,520 Q200,500 250,480" fill="none" stroke="#0A0A0A" stroke-width="0.25" opacity="0.07"/>
    <path d="M310,320 Q340,370 350,420" fill="none" stroke="#0A0A0A" stroke-width="0.25" opacity="0.08"/>
    <path d="M90,440 Q110,480 140,520" fill="none" stroke="#0A0A0A" stroke-width="0.2" opacity="0.06"/>
    <!-- RIGHT SIDE: organized, aligned elements -->
    <!-- Aligned circles in a clean grid -->
    <circle cx="500" cy="240" r="8" fill="none" stroke="#0A0A0A" stroke-width="0.6" opacity="0.22"/>
    <circle cx="600" cy="240" r="8" fill="none" stroke="#0A0A0A" stroke-width="0.6" opacity="0.22"/>
    <circle cx="700" cy="240" r="8" fill="none" stroke="#0A0A0A" stroke-width="0.6" opacity="0.22"/>
    <circle cx="500" cy="360" r="8" fill="none" stroke="#A0522D" stroke-width="0.6" opacity="0.22"/>
    <circle cx="600" cy="360" r="8" fill="none" stroke="#A0522D" stroke-width="0.6" opacity="0.22"/>
    <circle cx="700" cy="360" r="8" fill="none" stroke="#A0522D" stroke-width="0.6" opacity="0.22"/>
    <circle cx="500" cy="480" r="8" fill="none" stroke="#0A0A0A" stroke-width="0.6" opacity="0.22"/>
    <circle cx="600" cy="480" r="8" fill="none" stroke="#0A0A0A" stroke-width="0.6" opacity="0.22"/>
    <circle cx="700" cy="480" r="8" fill="none" stroke="#0A0A0A" stroke-width="0.6" opacity="0.22"/>
    <!-- Center dots right side -->
    <circle cx="500" cy="240" r="2" fill="#0A0A0A" opacity="0.35"/>
    <circle cx="600" cy="240" r="2" fill="#0A0A0A" opacity="0.35"/>
    <circle cx="700" cy="240" r="2" fill="#0A0A0A" opacity="0.35"/>
    <circle cx="500" cy="360" r="2.5" fill="#A0522D" opacity="0.4"/>
    <circle cx="600" cy="360" r="2.5" fill="#A0522D" opacity="0.4"/>
    <circle cx="700" cy="360" r="2.5" fill="#A0522D" opacity="0.4"/>
    <circle cx="500" cy="480" r="2" fill="#0A0A0A" opacity="0.35"/>
    <circle cx="600" cy="480" r="2" fill="#0A0A0A" opacity="0.35"/>
    <circle cx="700" cy="480" r="2" fill="#0A0A0A" opacity="0.35"/>
    <!-- Clean horizontal connections -->
    <line x1="508" y1="240" x2="592" y2="240" stroke="#0A0A0A" stroke-width="0.4" opacity="0.15"/>
    <line x1="608" y1="240" x2="692" y2="240" stroke="#0A0A0A" stroke-width="0.4" opacity="0.15"/>
    <line x1="508" y1="360" x2="592" y2="360" stroke="#A0522D" stroke-width="0.5" opacity="0.18"/>
    <line x1="608" y1="360" x2="692" y2="360" stroke="#A0522D" stroke-width="0.5" opacity="0.18"/>
    <line x1="508" y1="480" x2="592" y2="480" stroke="#0A0A0A" stroke-width="0.4" opacity="0.15"/>
    <line x1="608" y1="480" x2="692" y2="480" stroke="#0A0A0A" stroke-width="0.4" opacity="0.15"/>
    <!-- Clean vertical connections -->
    <line x1="500" y1="248" x2="500" y2="352" stroke="#0A0A0A" stroke-width="0.4" opacity="0.12"/>
    <line x1="600" y1="248" x2="600" y2="352" stroke="#0A0A0A" stroke-width="0.4" opacity="0.12"/>
    <line x1="700" y1="248" x2="700" y2="352" stroke="#0A0A0A" stroke-width="0.4" opacity="0.12"/>
    <line x1="500" y1="368" x2="500" y2="472" stroke="#0A0A0A" stroke-width="0.4" opacity="0.12"/>
    <line x1="600" y1="368" x2="600" y2="472" stroke="#0A0A0A" stroke-width="0.4" opacity="0.12"/>
    <line x1="700" y1="368" x2="700" y2="472" stroke="#0A0A0A" stroke-width="0.4" opacity="0.12"/>
  </g>
  <rect width="800" height="800" filter="url(#grain)" opacity="0.5"/>
</svg>