<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="50%" stop-color="#F4EFE6"/>
      <stop offset="100%" stop-color="#EDE5D5"/>
    </linearGradient>
        <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="1"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#0A0A0A" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <!-- Flowing parallel lines curving in harmony -->
    <path d="M80,180 Q250,140 400,200 Q550,260 720,220" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.08"/>
    <path d="M80,210 Q250,170 400,230 Q550,290 720,250" fill="none" stroke="#0A0A0A" stroke-width="0.45" opacity="0.1"/>
    <path d="M80,240 Q250,200 400,260 Q550,320 720,280" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.12"/>
    <path d="M80,270 Q250,230 400,290 Q550,350 720,310" fill="none" stroke="#0A0A0A" stroke-width="0.55" opacity="0.14"/>
    <path d="M80,300 Q250,260 400,320 Q550,380 720,340" fill="none" stroke="#0A0A0A" stroke-width="0.6" opacity="0.16"/>
    <path d="M80,330 Q250,290 400,350 Q550,410 720,370" fill="none" stroke="#A0522D" stroke-width="0.5" opacity="0.14"/>
    <path d="M80,360 Q250,320 400,380 Q550,440 720,400" fill="none" stroke="#A0522D" stroke-width="0.6" opacity="0.18"/>
    <path d="M80,390 Q250,350 400,410 Q550,470 720,430" fill="none" stroke="#A0522D" stroke-width="0.7" opacity="0.2"/>
    <path d="M80,420 Q250,380 400,440 Q550,500 720,460" fill="none" stroke="#A0522D" stroke-width="0.6" opacity="0.18"/>
    <path d="M80,450 Q250,410 400,470 Q550,530 720,490" fill="none" stroke="#A0522D" stroke-width="0.5" opacity="0.14"/>
    <path d="M80,480 Q250,440 400,500 Q550,560 720,520" fill="none" stroke="#0A0A0A" stroke-width="0.6" opacity="0.16"/>
    <path d="M80,510 Q250,470 400,530 Q550,590 720,550" fill="none" stroke="#0A0A0A" stroke-width="0.55" opacity="0.14"/>
    <path d="M80,540 Q250,500 400,560 Q550,620 720,580" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.12"/>
    <path d="M80,570 Q250,530 400,590 Q550,650 720,610" fill="none" stroke="#0A0A0A" stroke-width="0.45" opacity="0.1"/>
    <path d="M80,600 Q250,560 400,620 Q550,680 720,640" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.08"/>
    <!-- Subtle perpendicular accent lines -->
    <line x1="250" y1="160" x2="250" y2="640" stroke="#0A0A0A" stroke-width="0.2" opacity="0.05"/>
    <line x1="400" y1="160" x2="400" y2="640" stroke="#A0522D" stroke-width="0.25" opacity="0.06"/>
    <line x1="550" y1="160" x2="550" y2="640" stroke="#0A0A0A" stroke-width="0.2" opacity="0.05"/>
  </g>
  <rect width="800" height="800" filter="url(#grain)" opacity="0.5"/>
</svg>