<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="50%" stop-color="#F4EFE6"/>
      <stop offset="100%" stop-color="#EDE5D5"/>
    </linearGradient>
        <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="1"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#0A0A0A" flood-opacity="0.08"/>
    </filter>
    <radialGradient id="rustGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#A0522D" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#A0522D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#2D5016" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2D5016" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <!-- Concentric rings -->
    <circle cx="400" cy="400" r="300" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.1"/>
    <circle cx="400" cy="400" r="250" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.12"/>
    <circle cx="400" cy="400" r="200" fill="none" stroke="#A0522D" stroke-width="0.6" opacity="0.18"/>
    <circle cx="400" cy="400" r="150" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.15"/>
    <circle cx="400" cy="400" r="100" fill="none" stroke="#2D5016" stroke-width="0.6" opacity="0.18"/>
    <circle cx="400" cy="400" r="50" fill="none" stroke="#0A0A0A" stroke-width="0.7" opacity="0.2"/>
    <!-- Center focal point -->
    <circle cx="400" cy="400" r="30" fill="url(#rustGlow)"/>
    <circle cx="400" cy="400" r="5" fill="#A0522D" opacity="0.6"/>
    <!-- Nodes on outer ring -->
    <circle cx="400" cy="100" r="4" fill="#0A0A0A" opacity="0.4"/>
    <circle cx="660" cy="270" r="3.5" fill="#0A0A0A" opacity="0.35"/>
    <circle cx="700" cy="400" r="3" fill="#A0522D" opacity="0.4"/>
    <circle cx="660" cy="530" r="3.5" fill="#0A0A0A" opacity="0.35"/>
    <circle cx="400" cy="700" r="4" fill="#2D5016" opacity="0.4"/>
    <circle cx="140" cy="530" r="3" fill="#0A0A0A" opacity="0.35"/>
    <circle cx="100" cy="400" r="3.5" fill="#A0522D" opacity="0.4"/>
    <circle cx="140" cy="270" r="4" fill="#0A0A0A" opacity="0.35"/>
    <!-- Nodes on middle rings -->
    <circle cx="500" cy="200" r="3.5" fill="#A0522D" opacity="0.45"/>
    <circle cx="580" cy="350" r="3" fill="#0A0A0A" opacity="0.4"/>
    <circle cx="550" cy="500" r="3.5" fill="#2D5016" opacity="0.4"/>
    <circle cx="400" cy="600" r="3" fill="#0A0A0A" opacity="0.35"/>
    <circle cx="250" cy="550" r="3.5" fill="#A0522D" opacity="0.4"/>
    <circle cx="200" cy="400" r="3" fill="#0A0A0A" opacity="0.35"/>
    <circle cx="220" cy="250" r="3.5" fill="#2D5016" opacity="0.4"/>
    <circle cx="350" cy="200" r="3" fill="#0A0A0A" opacity="0.35"/>
    <!-- Inner nodes -->
    <circle cx="450" cy="310" r="2.5" fill="#A0522D" opacity="0.5"/>
    <circle cx="480" cy="430" r="2.5" fill="#0A0A0A" opacity="0.4"/>
    <circle cx="370" cy="490" r="2.5" fill="#2D5016" opacity="0.45"/>
    <circle cx="310" cy="380" r="2.5" fill="#0A0A0A" opacity="0.4"/>
    <circle cx="360" cy="320" r="2.5" fill="#A0522D" opacity="0.45"/>
    <!-- Connecting lines from center -->
    <line x1="400" y1="400" x2="400" y2="100" stroke="#0A0A0A" stroke-width="0.3" opacity="0.1"/>
    <line x1="400" y1="400" x2="700" y2="400" stroke="#A0522D" stroke-width="0.3" opacity="0.1"/>
    <line x1="400" y1="400" x2="400" y2="700" stroke="#2D5016" stroke-width="0.3" opacity="0.1"/>
    <line x1="400" y1="400" x2="100" y2="400" stroke="#A0522D" stroke-width="0.3" opacity="0.1"/>
    <!-- Elegant curved connections -->
    <path d="M400,100 Q520,160 500,200" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.15"/>
    <path d="M500,200 Q550,270 580,350" fill="none" stroke="#A0522D" stroke-width="0.4" opacity="0.15"/>
    <path d="M580,350 Q570,430 550,500" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.12"/>
    <path d="M550,500 Q480,560 400,600" fill="none" stroke="#2D5016" stroke-width="0.4" opacity="0.15"/>
    <path d="M400,600 Q320,580 250,550" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.12"/>
    <path d="M250,550 Q210,480 200,400" fill="none" stroke="#A0522D" stroke-width="0.4" opacity="0.15"/>
    <path d="M200,400 Q210,320 220,250" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.12"/>
    <path d="M220,250 Q280,210 350,200" fill="none" stroke="#2D5016" stroke-width="0.4" opacity="0.15"/>
    <path d="M350,200 Q380,150 400,100" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.12"/>
    <!-- Cross connections -->
    <path d="M450,310 Q500,370 480,430" fill="none" stroke="#A0522D" stroke-width="0.3" opacity="0.15"/>
    <path d="M480,430 Q430,470 370,490" fill="none" stroke="#0A0A0A" stroke-width="0.3" opacity="0.12"/>
    <path d="M370,490 Q330,440 310,380" fill="none" stroke="#2D5016" stroke-width="0.3" opacity="0.15"/>
    <path d="M310,380 Q330,340 360,320" fill="none" stroke="#0A0A0A" stroke-width="0.3" opacity="0.12"/>
    <path d="M360,320 Q410,300 450,310" fill="none" stroke="#A0522D" stroke-width="0.3" opacity="0.15"/>
    <!-- Long flowing curves -->
    <path d="M140,270 Q280,320 400,400 Q520,480 660,530" fill="none" stroke="#0A0A0A" stroke-width="0.25" opacity="0.08"/>
    <path d="M660,270 Q530,330 400,400 Q270,470 140,530" fill="none" stroke="#A0522D" stroke-width="0.25" opacity="0.08"/>
  </g>
  <rect width="800" height="800" filter="url(#grain)" opacity="0.5"/>
</svg>