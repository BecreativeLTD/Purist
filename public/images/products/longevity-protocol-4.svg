<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="50%" stop-color="#F4EFE6"/>
      <stop offset="100%" stop-color="#EDE5D5"/>
    </linearGradient>
        <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="1"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#0A0A0A" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="waveRust" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A0522D" stop-opacity="0"/>
      <stop offset="30%" stop-color="#A0522D" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#A0522D" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#A0522D" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="waveGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2D5016" stop-opacity="0"/>
      <stop offset="30%" stop-color="#2D5016" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#2D5016" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2D5016" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <!-- Abstract wave forms - layered sine-like curves -->
    <!-- Wave layer 1 - top, subtle -->
    <path d="M0,180 Q100,150 200,180 Q300,210 400,180 Q500,150 600,180 Q700,210 800,180" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.08"/>
    <path d="M0,200 Q100,170 200,200 Q300,230 400,200 Q500,170 600,200 Q700,230 800,200" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.1"/>
    <!-- Wave layer 2 -->
    <path d="M0,260 Q100,220 200,260 Q300,300 400,260 Q500,220 600,260 Q700,300 800,260" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.1"/>
    <path d="M0,280 Q100,240 200,280 Q300,320 400,280 Q500,240 600,280 Q700,320 800,280" fill="none" stroke="#A0522D" stroke-width="0.55" opacity="0.12"/>
    <path d="M0,300 Q100,260 200,300 Q300,340 400,300 Q500,260 600,300 Q700,340 800,300" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.1"/>
    <!-- Wave layer 3 - center, strongest -->
    <path d="M0,350 Q100,300 200,350 Q300,400 400,350 Q500,300 600,350 Q700,400 800,350" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.12"/>
    <path d="M0,370 Q100,320 200,370 Q300,420 400,370 Q500,320 600,370 Q700,420 800,370" fill="none" stroke="#A0522D" stroke-width="0.7" opacity="0.18"/>
    <path d="M0,390 Q100,340 200,390 Q300,440 400,390 Q500,340 600,390 Q700,440 800,390" fill="none" stroke="url(#waveRust)" stroke-width="0.8"/>
    <path d="M0,410 Q100,360 200,410 Q300,460 400,410 Q500,360 600,410 Q700,460 800,410" fill="none" stroke="#A0522D" stroke-width="0.7" opacity="0.18"/>
    <path d="M0,430 Q100,380 200,430 Q300,480 400,430 Q500,380 600,430 Q700,480 800,430" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.12"/>
    <!-- Wave layer 4 -->
    <path d="M0,490 Q100,450 200,490 Q300,530 400,490 Q500,450 600,490 Q700,530 800,490" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.1"/>
    <path d="M0,510 Q100,470 200,510 Q300,550 400,510 Q500,470 600,510 Q700,550 800,510" fill="none" stroke="url(#waveGreen)" stroke-width="0.6"/>
    <path d="M0,530 Q100,490 200,530 Q300,570 400,530 Q500,490 600,530 Q700,570 800,530" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.1"/>
    <!-- Wave layer 5 - bottom, subtle -->
    <path d="M0,590 Q100,560 200,590 Q300,620 400,590 Q500,560 600,590 Q700,620 800,590" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.1"/>
    <path d="M0,610 Q100,580 200,610 Q300,640 400,610 Q500,580 600,610 Q700,640 800,610" fill="none" stroke="#2D5016" stroke-width="0.5" opacity="0.1"/>
    <path d="M0,630 Q100,600 200,630 Q300,660 400,630 Q500,600 600,630 Q700,660 800,630" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.08"/>
    <!-- Subtle vertical accent marks at wave peaks -->
    <line x1="200" y1="340" x2="200" y2="440" stroke="#0A0A0A" stroke-width="0.2" opacity="0.05"/>
    <line x1="400" y1="340" x2="400" y2="440" stroke="#A0522D" stroke-width="0.25" opacity="0.06"/>
    <line x1="600" y1="340" x2="600" y2="440" stroke="#0A0A0A" stroke-width="0.2" opacity="0.05"/>
    <!-- Small dots at wave intersections -->
    <circle cx="200" cy="390" r="1.5" fill="#A0522D" opacity="0.2"/>
    <circle cx="400" cy="390" r="2" fill="#A0522D" opacity="0.25"/>
    <circle cx="600" cy="390" r="1.5" fill="#A0522D" opacity="0.2"/>
    <circle cx="100" cy="370" r="1" fill="#0A0A0A" opacity="0.15"/>
    <circle cx="300" cy="420" r="1" fill="#0A0A0A" opacity="0.15"/>
    <circle cx="500" cy="370" r="1" fill="#0A0A0A" opacity="0.15"/>
    <circle cx="700" cy="420" r="1" fill="#0A0A0A" opacity="0.15"/>
  </g>
  <rect width="800" height="800" filter="url(#grain)" opacity="0.5"/>
</svg>