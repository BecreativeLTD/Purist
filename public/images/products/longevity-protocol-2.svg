<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="50%" stop-color="#F4EFE6"/>
      <stop offset="100%" stop-color="#EDE5D5"/>
    </linearGradient>
        <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="1"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#0A0A0A" flood-opacity="0.08"/>
    </filter>
    <radialGradient id="centerPulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A0522D" stop-opacity="0.12"/>
      <stop offset="30%" stop-color="#A0522D" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#2D5016" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <!-- Radiating concentric shapes - ripples of intelligence -->
    <!-- Center point -->
    <circle cx="400" cy="400" r="4" fill="#A0522D" opacity="0.5"/>
    <!-- Inner ripples - circles -->
    <circle cx="400" cy="400" r="30" fill="none" stroke="#A0522D" stroke-width="0.8" opacity="0.25"/>
    <circle cx="400" cy="400" r="60" fill="none" stroke="#A0522D" stroke-width="0.7" opacity="0.2"/>
    <circle cx="400" cy="400" r="95" fill="none" stroke="#0A0A0A" stroke-width="0.6" opacity="0.16"/>
    <!-- Transitioning to organic shapes -->
    <ellipse cx="400" cy="400" rx="140" ry="130" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.13" transform="rotate(5 400 400)"/>
    <ellipse cx="400" cy="400" rx="185" ry="175" fill="none" stroke="#2D5016" stroke-width="0.5" opacity="0.11" transform="rotate(-8 400 400)"/>
    <ellipse cx="400" cy="400" rx="235" ry="220" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.09" transform="rotate(12 400 400)"/>
    <ellipse cx="400" cy="400" rx="285" ry="265" fill="none" stroke="#A0522D" stroke-width="0.35" opacity="0.07" transform="rotate(-5 400 400)"/>
    <ellipse cx="400" cy="400" rx="330" ry="310" fill="none" stroke="#0A0A0A" stroke-width="0.3" opacity="0.05" transform="rotate(8 400 400)"/>
    <!-- Radial rays from center -->
    <line x1="400" y1="400" x2="400" y2="100" stroke="#0A0A0A" stroke-width="0.2" opacity="0.06"/>
    <line x1="400" y1="400" x2="620" y2="180" stroke="#0A0A0A" stroke-width="0.2" opacity="0.06"/>
    <line x1="400" y1="400" x2="700" y2="400" stroke="#A0522D" stroke-width="0.2" opacity="0.06"/>
    <line x1="400" y1="400" x2="620" y2="620" stroke="#0A0A0A" stroke-width="0.2" opacity="0.06"/>
    <line x1="400" y1="400" x2="400" y2="700" stroke="#2D5016" stroke-width="0.2" opacity="0.06"/>
    <line x1="400" y1="400" x2="180" y2="620" stroke="#0A0A0A" stroke-width="0.2" opacity="0.06"/>
    <line x1="400" y1="400" x2="100" y2="400" stroke="#0A0A0A" stroke-width="0.2" opacity="0.06"/>
    <line x1="400" y1="400" x2="180" y2="180" stroke="#A0522D" stroke-width="0.2" opacity="0.06"/>
    <!-- Small nodes where rays intersect ripples -->
    <circle cx="400" cy="370" r="1.5" fill="#A0522D" opacity="0.3"/>
    <circle cx="400" cy="340" r="1.5" fill="#A0522D" opacity="0.25"/>
    <circle cx="400" cy="305" r="1.5" fill="#0A0A0A" opacity="0.2"/>
    <circle cx="400" cy="265" r="1.5" fill="#0A0A0A" opacity="0.15"/>
    <circle cx="430" cy="400" r="1.5" fill="#A0522D" opacity="0.3"/>
    <circle cx="460" cy="400" r="1.5" fill="#A0522D" opacity="0.25"/>
    <circle cx="495" cy="400" r="1.5" fill="#0A0A0A" opacity="0.2"/>
    <circle cx="535" cy="400" r="1.5" fill="#0A0A0A" opacity="0.15"/>
    <circle cx="422" cy="378" r="1.5" fill="#A0522D" opacity="0.25"/>
    <circle cx="442" cy="358" r="1.5" fill="#0A0A0A" opacity="0.2"/>
    <circle cx="378" cy="422" r="1.5" fill="#2D5016" opacity="0.25"/>
    <circle cx="356" cy="444" r="1.5" fill="#0A0A0A" opacity="0.2"/>
    <!-- Central glow -->
    <circle cx="400" cy="400" r="150" fill="url(#centerPulse)"/>
  </g>
  <rect width="800" height="800" filter="url(#grain)" opacity="0.5"/>
</svg>