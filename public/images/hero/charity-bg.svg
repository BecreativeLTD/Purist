<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="cbase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0e0e"/>
      <stop offset="50%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <filter id="cgrain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="9"/>
      <feColorMatrix values="0 0 0 0 0.9  0 0 0 0 0.85  0 0 0 0 0.8  0 0 0 0.04 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#cbase)"/>

  <!-- Circuit board / workflow pattern — very low opacity for dark overlay use -->

  <!-- Horizontal circuit traces -->
  <g stroke="#FFFFFF" stroke-width="0.5" fill="none" opacity="0.05">
    <line x1="0" y1="100" x2="300" y2="100"/>
    <line x1="340" y1="100" x2="600" y2="100"/>
    <line x1="640" y1="100" x2="900" y2="100"/>
    <line x1="940" y1="100" x2="1200" y2="100"/>

    <line x1="0" y1="200" x2="200" y2="200"/>
    <line x1="240" y1="200" x2="500" y2="200"/>
    <line x1="700" y1="200" x2="1000" y2="200"/>
    <line x1="1040" y1="200" x2="1200" y2="200"/>

    <line x1="100" y1="300" x2="400" y2="300"/>
    <line x1="440" y1="300" x2="760" y2="300"/>
    <line x1="800" y1="300" x2="1100" y2="300"/>

    <line x1="0" y1="400" x2="350" y2="400"/>
    <line x1="390" y1="400" x2="650" y2="400"/>
    <line x1="690" y1="400" x2="900" y2="400"/>
    <line x1="940" y1="400" x2="1200" y2="400"/>

    <line x1="50" y1="500" x2="280" y2="500"/>
    <line x1="320" y1="500" x2="580" y2="500"/>
    <line x1="620" y1="500" x2="850" y2="500"/>
    <line x1="890" y1="500" x2="1150" y2="500"/>

    <line x1="0" y1="600" x2="260" y2="600"/>
    <line x1="300" y1="600" x2="550" y2="600"/>
    <line x1="650" y1="600" x2="950" y2="600"/>
    <line x1="990" y1="600" x2="1200" y2="600"/>

    <line x1="80" y1="700" x2="380" y2="700"/>
    <line x1="420" y1="700" x2="720" y2="700"/>
    <line x1="760" y1="700" x2="1120" y2="700"/>
  </g>

  <!-- Vertical circuit traces -->
  <g stroke="#FFFFFF" stroke-width="0.5" fill="none" opacity="0.05">
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="150" y1="240" x2="150" y2="500"/>
    <line x1="150" y1="540" x2="150" y2="800"/>

    <line x1="300" y1="60" x2="300" y2="300"/>
    <line x1="300" y1="340" x2="300" y2="600"/>
    <line x1="300" y1="640" x2="300" y2="800"/>

    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="500" y1="240" x2="500" y2="500"/>
    <line x1="500" y1="540" x2="500" y2="700"/>

    <line x1="650" y1="100" x2="650" y2="400"/>
    <line x1="650" y1="440" x2="650" y2="800"/>

    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="800" y1="340" x2="800" y2="600"/>
    <line x1="800" y1="640" x2="800" y2="800"/>

    <line x1="950" y1="0" x2="950" y2="200"/>
    <line x1="950" y1="240" x2="950" y2="500"/>
    <line x1="950" y1="540" x2="950" y2="800"/>

    <line x1="1100" y1="100" x2="1100" y2="400"/>
    <line x1="1100" y1="440" x2="1100" y2="700"/>
  </g>

  <!-- Circuit junction nodes -->
  <g fill="#FFFFFF" opacity="0.08">
    <!-- Row 1 -->
    <circle cx="150" cy="100" r="4"/>
    <circle cx="300" cy="100" r="3"/>
    <circle cx="500" cy="100" r="4"/>
    <circle cx="650" cy="100" r="3"/>
    <circle cx="800" cy="100" r="4"/>
    <circle cx="950" cy="100" r="3"/>
    <circle cx="1100" cy="100" r="4"/>

    <!-- Row 2 -->
    <circle cx="150" cy="200" r="3"/>
    <circle cx="300" cy="200" r="4"/>
    <circle cx="500" cy="200" r="3"/>
    <circle cx="800" cy="200" r="4"/>
    <circle cx="950" cy="200" r="3"/>

    <!-- Row 3 -->
    <circle cx="300" cy="300" r="3"/>
    <circle cx="500" cy="300" r="4"/>
    <circle cx="650" cy="300" r="3"/>
    <circle cx="800" cy="300" r="4"/>
    <circle cx="1100" cy="300" r="3"/>

    <!-- Row 4 -->
    <circle cx="150" cy="400" r="4"/>
    <circle cx="300" cy="400" r="3"/>
    <circle cx="500" cy="400" r="4"/>
    <circle cx="650" cy="400" r="3"/>
    <circle cx="800" cy="400" r="4"/>
    <circle cx="950" cy="400" r="3"/>
    <circle cx="1100" cy="400" r="4"/>

    <!-- Row 5 -->
    <circle cx="150" cy="500" r="3"/>
    <circle cx="300" cy="500" r="4"/>
    <circle cx="500" cy="500" r="3"/>
    <circle cx="800" cy="500" r="4"/>
    <circle cx="950" cy="500" r="3"/>

    <!-- Row 6 -->
    <circle cx="300" cy="600" r="3"/>
    <circle cx="500" cy="600" r="4"/>
    <circle cx="650" cy="600" r="3"/>
    <circle cx="800" cy="600" r="4"/>
    <circle cx="950" cy="600" r="3"/>

    <!-- Row 7 -->
    <circle cx="150" cy="700" r="4"/>
    <circle cx="300" cy="700" r="3"/>
    <circle cx="500" cy="700" r="4"/>
    <circle cx="650" cy="700" r="3"/>
    <circle cx="800" cy="700" r="4"/>
    <circle cx="1100" cy="700" r="3"/>
  </g>

  <!-- Larger accent nodes at key intersections -->
  <g opacity="0.06">
    <circle cx="300" cy="300" r="8" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
    <circle cx="650" cy="400" r="10" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
    <circle cx="950" cy="200" r="8" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
    <circle cx="500" cy="600" r="9" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
    <circle cx="150" cy="500" r="8" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
    <circle cx="1100" cy="400" r="10" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
    <circle cx="800" cy="700" r="8" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
  </g>

  <!-- Workflow arrow hints at some junctions -->
  <g stroke="#FFFFFF" stroke-width="0.5" fill="none" opacity="0.06">
    <!-- Right arrows -->
    <path d="M 296 100 L 304 100 M 302 97 L 306 100 L 302 103"/>
    <path d="M 646 400 L 654 400 M 652 397 L 656 400 L 652 403"/>
    <path d="M 946 500 L 954 500 M 952 497 L 956 500 L 952 503"/>
    <!-- Down arrows -->
    <path d="M 500 196 L 500 204 M 497 202 L 500 206 L 503 202"/>
    <path d="M 800 296 L 800 304 M 797 302 L 800 306 L 803 302"/>
    <path d="M 300 596 L 300 604 M 297 602 L 300 606 L 303 602"/>
  </g>

  <!-- Subtle grain overlay -->
  <rect width="1200" height="800" filter="url(#cgrain)" opacity="0.5"/>
</svg>
