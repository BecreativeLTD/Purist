<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="1"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="100%" stop-color="#F4EFE6"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)" rx="12"/>
  <!-- Concentric rings -->
  <circle cx="300" cy="370" r="200" fill="none" stroke="#0A0A0A" stroke-width="1" opacity="0.35"/>
  <circle cx="300" cy="370" r="140" fill="none" stroke="#0A0A0A" stroke-width="1" opacity="0.4"/>
  <circle cx="300" cy="370" r="80" fill="none" stroke="#0A0A0A" stroke-width="1" opacity="0.45"/>
  <!-- Center focal dot in rust -->
  <circle cx="300" cy="370" r="6" fill="#A0522D" opacity="0.6"/>
  <!-- 8 outer nodes at r=200, every 45 degrees -->
  <circle cx="500" cy="370" r="4" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="441.4" cy="228.6" r="4" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="300" cy="170" r="4" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="158.6" cy="228.6" r="4" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="100" cy="370" r="4" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="158.6" cy="511.4" r="4" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="300" cy="570" r="4" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="441.4" cy="511.4" r="4" fill="#0A0A0A" opacity="0.4"/>
  <!-- Lines from outer nodes to center -->
  <line x1="300" y1="370" x2="500" y2="370" stroke="#0A0A0A" stroke-width="0.5" opacity="0.25"/>
  <line x1="300" y1="370" x2="441.4" y2="228.6" stroke="#0A0A0A" stroke-width="0.5" opacity="0.25"/>
  <line x1="300" y1="370" x2="300" y2="170" stroke="#0A0A0A" stroke-width="0.5" opacity="0.25"/>
  <line x1="300" y1="370" x2="158.6" y2="228.6" stroke="#0A0A0A" stroke-width="0.5" opacity="0.25"/>
  <line x1="300" y1="370" x2="100" y2="370" stroke="#0A0A0A" stroke-width="0.5" opacity="0.25"/>
  <line x1="300" y1="370" x2="158.6" y2="511.4" stroke="#0A0A0A" stroke-width="0.5" opacity="0.25"/>
  <line x1="300" y1="370" x2="300" y2="570" stroke="#0A0A0A" stroke-width="0.5" opacity="0.25"/>
  <line x1="300" y1="370" x2="441.4" y2="511.4" stroke="#0A0A0A" stroke-width="0.5" opacity="0.25"/>
  <!-- 6 mid nodes at r=140, every 60 degrees -->
  <circle cx="440" cy="370" r="3.5" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="370" cy="248.8" r="3.5" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="230" cy="248.8" r="3.5" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="160" cy="370" r="3.5" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="230" cy="491.2" r="3.5" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="370" cy="491.2" r="3.5" fill="#0A0A0A" opacity="0.4"/>
  <!-- Mid-to-outer connections -->
  <line x1="440" y1="370" x2="500" y2="370" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <line x1="370" y1="248.8" x2="441.4" y2="228.6" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <line x1="370" y1="248.8" x2="300" y2="170" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <line x1="230" y1="248.8" x2="300" y2="170" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <line x1="230" y1="248.8" x2="158.6" y2="228.6" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <line x1="160" y1="370" x2="100" y2="370" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <line x1="230" y1="491.2" x2="158.6" y2="511.4" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <line x1="230" y1="491.2" x2="300" y2="570" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <line x1="370" y1="491.2" x2="300" y2="570" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <line x1="370" y1="491.2" x2="441.4" y2="511.4" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <!-- 4 inner nodes at r=80, every 90 degrees -->
  <circle cx="380" cy="370" r="3" fill="#A0522D" opacity="0.5"/>
  <circle cx="300" cy="290" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="220" cy="370" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="300" cy="450" r="3" fill="#0A0A0A" opacity="0.4"/>
  <!-- Inner node connections -->
  <line x1="380" y1="370" x2="300" y2="290" stroke="#A0522D" stroke-width="0.6" opacity="0.3"/>
  <line x1="300" y1="290" x2="220" y2="370" stroke="#0A0A0A" stroke-width="0.5" opacity="0.25"/>
  <line x1="220" y1="370" x2="300" y2="450" stroke="#0A0A0A" stroke-width="0.5" opacity="0.25"/>
  <line x1="300" y1="450" x2="380" y2="370" stroke="#A0522D" stroke-width="0.6" opacity="0.3"/>
  <!-- Label -->
  <text x="300" y="740" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#0A0A0A" opacity="0.4" letter-spacing="6">FOUNDER</text>
  <!-- Grain overlay -->
  <rect width="600" height="800" filter="url(#grain)" opacity="0.5" rx="12"/>
</svg>