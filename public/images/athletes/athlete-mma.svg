<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="8"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="100%" stop-color="#F4EFE6"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)" rx="12"/>
  <!-- Diamond lattice - rotated 45deg grid -->
  <!-- Vertical diamond lines (diagonal going down-right) -->
  <line x1="100" y1="160" x2="380" y2="640" stroke="#0A0A0A" stroke-width="0.7" opacity="0.25"/>
  <line x1="180" y1="160" x2="460" y2="640" stroke="#0A0A0A" stroke-width="0.7" opacity="0.25"/>
  <line x1="260" y1="160" x2="540" y2="640" stroke="#0A0A0A" stroke-width="0.7" opacity="0.25"/>
  <line x1="340" y1="160" x2="540" y2="560" stroke="#0A0A0A" stroke-width="0.7" opacity="0.25"/>
  <line x1="420" y1="160" x2="540" y2="400" stroke="#0A0A0A" stroke-width="0.7" opacity="0.25"/>
  <line x1="60" y1="240" x2="300" y2="640" stroke="#0A0A0A" stroke-width="0.7" opacity="0.25"/>
  <line x1="60" y1="400" x2="220" y2="640" stroke="#0A0A0A" stroke-width="0.7" opacity="0.25"/>
  <!-- Diagonal going down-left -->
  <line x1="500" y1="160" x2="220" y2="640" stroke="#0A0A0A" stroke-width="0.7" opacity="0.25"/>
  <line x1="420" y1="160" x2="140" y2="640" stroke="#0A0A0A" stroke-width="0.7" opacity="0.25"/>
  <line x1="340" y1="160" x2="60" y2="640" stroke="#0A0A0A" stroke-width="0.7" opacity="0.25"/>
  <line x1="260" y1="160" x2="60" y2="560" stroke="#0A0A0A" stroke-width="0.7" opacity="0.25"/>
  <line x1="180" y1="160" x2="60" y2="400" stroke="#0A0A0A" stroke-width="0.7" opacity="0.25"/>
  <line x1="540" y1="240" x2="300" y2="640" stroke="#0A0A0A" stroke-width="0.7" opacity="0.25"/>
  <line x1="540" y1="400" x2="380" y2="640" stroke="#0A0A0A" stroke-width="0.7" opacity="0.25"/>
  <!-- Rust accent on one diagonal -->
  <line x1="300" y1="160" x2="300" y2="640" stroke="#A0522D" stroke-width="1.2" opacity="0.4"/>
  <!-- Alternating filled/empty nodes at diamond intersections -->
  <circle cx="300" cy="160" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="220" cy="240" r="2.5" fill="none" stroke="#0A0A0A" stroke-width="0.8" opacity="0.35"/>
  <circle cx="380" cy="240" r="2.5" fill="none" stroke="#0A0A0A" stroke-width="0.8" opacity="0.35"/>
  <circle cx="300" cy="240" r="3" fill="#A0522D" opacity="0.45"/>
  <circle cx="140" cy="320" r="3" fill="#0A0A0A" opacity="0.35"/>
  <circle cx="220" cy="320" r="2.5" fill="none" stroke="#0A0A0A" stroke-width="0.8" opacity="0.3"/>
  <circle cx="300" cy="320" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="380" cy="320" r="2.5" fill="none" stroke="#0A0A0A" stroke-width="0.8" opacity="0.3"/>
  <circle cx="460" cy="320" r="3" fill="#0A0A0A" opacity="0.35"/>
  <circle cx="100" cy="400" r="2.5" fill="none" stroke="#0A0A0A" stroke-width="0.8" opacity="0.3"/>
  <circle cx="180" cy="400" r="3" fill="#0A0A0A" opacity="0.35"/>
  <circle cx="260" cy="400" r="2.5" fill="none" stroke="#0A0A0A" stroke-width="0.8" opacity="0.3"/>
  <circle cx="300" cy="400" r="4" fill="#A0522D" opacity="0.5"/>
  <circle cx="340" cy="400" r="2.5" fill="none" stroke="#0A0A0A" stroke-width="0.8" opacity="0.3"/>
  <circle cx="420" cy="400" r="3" fill="#0A0A0A" opacity="0.35"/>
  <circle cx="500" cy="400" r="2.5" fill="none" stroke="#0A0A0A" stroke-width="0.8" opacity="0.3"/>
  <circle cx="140" cy="480" r="2.5" fill="none" stroke="#0A0A0A" stroke-width="0.8" opacity="0.3"/>
  <circle cx="220" cy="480" r="3" fill="#0A0A0A" opacity="0.35"/>
  <circle cx="300" cy="480" r="3" fill="#A0522D" opacity="0.45"/>
  <circle cx="380" cy="480" r="3" fill="#0A0A0A" opacity="0.35"/>
  <circle cx="460" cy="480" r="2.5" fill="none" stroke="#0A0A0A" stroke-width="0.8" opacity="0.3"/>
  <circle cx="220" cy="560" r="3" fill="#0A0A0A" opacity="0.35"/>
  <circle cx="300" cy="560" r="2.5" fill="none" stroke="#0A0A0A" stroke-width="0.8" opacity="0.3"/>
  <circle cx="380" cy="560" r="3" fill="#0A0A0A" opacity="0.35"/>
  <circle cx="300" cy="640" r="3" fill="#0A0A0A" opacity="0.4"/>
  <!-- Label -->
  <text x="300" y="740" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#0A0A0A" opacity="0.4" letter-spacing="6">STAFFING</text>
  <!-- Grain overlay -->
  <rect width="600" height="800" filter="url(#grain)" opacity="0.5" rx="12"/>
</svg>