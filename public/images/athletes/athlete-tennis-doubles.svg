<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="6"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="100%" stop-color="#F4EFE6"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)" rx="12"/>
  <!-- Network mesh - nodes -->
  <!-- Rust key nodes -->
  <circle cx="300" cy="400" r="4.5" fill="#A0522D" opacity="0.55"/>
  <circle cx="200" cy="300" r="4" fill="#A0522D" opacity="0.5"/>
  <circle cx="420" cy="340" r="4" fill="#A0522D" opacity="0.5"/>
  <circle cx="340" cy="520" r="4" fill="#A0522D" opacity="0.5"/>
  <!-- Regular nodes -->
  <circle cx="150" cy="200" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="300" cy="220" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="440" cy="220" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="500" cy="400" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="460" cy="520" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="180" cy="480" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="120" cy="380" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="250" cy="580" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="380" cy="600" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="350" cy="260" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="160" cy="560" r="3" fill="#0A0A0A" opacity="0.4"/>
  <!-- Network connections (triangulated mesh) -->
  <line x1="150" y1="200" x2="200" y2="300" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="150" y1="200" x2="300" y2="220" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="200" y1="300" x2="300" y2="220" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="300" y1="220" x2="350" y2="260" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="300" y1="220" x2="440" y2="220" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="350" y1="260" x2="440" y2="220" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="350" y1="260" x2="420" y2="340" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="440" y1="220" x2="420" y2="340" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="200" y1="300" x2="300" y2="400" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="200" y1="300" x2="120" y2="380" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="300" y1="400" x2="420" y2="340" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="300" y1="400" x2="350" y2="260" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="420" y1="340" x2="500" y2="400" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="300" y1="400" x2="340" y2="520" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="300" y1="400" x2="180" y2="480" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="120" y1="380" x2="180" y2="480" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="420" y1="340" x2="460" y2="520" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="340" y1="520" x2="460" y2="520" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="340" y1="520" x2="250" y2="580" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="340" y1="520" x2="380" y2="600" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="460" y1="520" x2="380" y2="600" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="180" y1="480" x2="250" y2="580" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="180" y1="480" x2="160" y2="560" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="160" y1="560" x2="250" y2="580" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="500" y1="400" x2="460" y2="520" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <line x1="250" y1="580" x2="380" y2="600" stroke="#0A0A0A" stroke-width="0.6" opacity="0.25"/>
  <!-- Label -->
  <text x="300" y="740" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#0A0A0A" opacity="0.4" letter-spacing="6">LEGAL</text>
  <!-- Grain overlay -->
  <rect width="600" height="800" filter="url(#grain)" opacity="0.5" rx="12"/>
</svg>