<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="4"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="100%" stop-color="#F4EFE6"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)" rx="12"/>
  <!-- Central point -->
  <circle cx="300" cy="400" r="5" fill="#A0522D" opacity="0.6"/>
  <!-- 12 radial lines at 30 degree intervals with dots -->
  <!-- 0 degrees (right) - rust -->
  <line x1="300" y1="400" x2="540" y2="400" stroke="#A0522D" stroke-width="0.8" opacity="0.4"/>
  <circle cx="380" cy="400" r="3" fill="#A0522D" opacity="0.45"/>
  <circle cx="460" cy="400" r="2.5" fill="#A0522D" opacity="0.35"/>
  <circle cx="520" cy="400" r="2" fill="#A0522D" opacity="0.25"/>
  <!-- 30 degrees -->
  <line x1="300" y1="400" x2="508" y2="280" stroke="#0A0A0A" stroke-width="0.6" opacity="0.3"/>
  <circle cx="370" cy="360" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="440" cy="320" r="2" fill="#0A0A0A" opacity="0.3"/>
  <!-- 60 degrees - rust -->
  <line x1="300" y1="400" x2="408" y2="192" stroke="#A0522D" stroke-width="0.8" opacity="0.4"/>
  <circle cx="340" cy="320" r="3" fill="#A0522D" opacity="0.45"/>
  <circle cx="370" cy="260" r="2.5" fill="#A0522D" opacity="0.35"/>
  <!-- 90 degrees (up) -->
  <line x1="300" y1="400" x2="300" y2="160" stroke="#0A0A0A" stroke-width="0.6" opacity="0.3"/>
  <circle cx="300" cy="310" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="300" cy="220" r="2.5" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="300" cy="175" r="2" fill="#0A0A0A" opacity="0.25"/>
  <!-- 120 degrees - rust -->
  <line x1="300" y1="400" x2="192" y2="192" stroke="#A0522D" stroke-width="0.8" opacity="0.4"/>
  <circle cx="260" cy="320" r="3" fill="#A0522D" opacity="0.45"/>
  <circle cx="230" cy="260" r="2.5" fill="#A0522D" opacity="0.35"/>
  <!-- 150 degrees -->
  <line x1="300" y1="400" x2="92" y2="280" stroke="#0A0A0A" stroke-width="0.6" opacity="0.3"/>
  <circle cx="230" cy="360" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="160" cy="320" r="2" fill="#0A0A0A" opacity="0.3"/>
  <!-- 180 degrees (left) - rust -->
  <line x1="300" y1="400" x2="60" y2="400" stroke="#A0522D" stroke-width="0.8" opacity="0.4"/>
  <circle cx="220" cy="400" r="3" fill="#A0522D" opacity="0.45"/>
  <circle cx="140" cy="400" r="2.5" fill="#A0522D" opacity="0.35"/>
  <circle cx="80" cy="400" r="2" fill="#A0522D" opacity="0.25"/>
  <!-- 210 degrees -->
  <line x1="300" y1="400" x2="92" y2="520" stroke="#0A0A0A" stroke-width="0.6" opacity="0.3"/>
  <circle cx="230" cy="440" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="160" cy="480" r="2" fill="#0A0A0A" opacity="0.3"/>
  <!-- 240 degrees - rust -->
  <line x1="300" y1="400" x2="192" y2="608" stroke="#A0522D" stroke-width="0.8" opacity="0.4"/>
  <circle cx="260" cy="480" r="3" fill="#A0522D" opacity="0.45"/>
  <circle cx="230" cy="540" r="2.5" fill="#A0522D" opacity="0.35"/>
  <!-- 270 degrees (down) -->
  <line x1="300" y1="400" x2="300" y2="640" stroke="#0A0A0A" stroke-width="0.6" opacity="0.3"/>
  <circle cx="300" cy="490" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="300" cy="580" r="2.5" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="300" cy="625" r="2" fill="#0A0A0A" opacity="0.25"/>
  <!-- 300 degrees - rust -->
  <line x1="300" y1="400" x2="408" y2="608" stroke="#A0522D" stroke-width="0.8" opacity="0.4"/>
  <circle cx="340" cy="480" r="3" fill="#A0522D" opacity="0.45"/>
  <circle cx="370" cy="540" r="2.5" fill="#A0522D" opacity="0.35"/>
  <!-- 330 degrees -->
  <line x1="300" y1="400" x2="508" y2="520" stroke="#0A0A0A" stroke-width="0.6" opacity="0.3"/>
  <circle cx="370" cy="440" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="440" cy="480" r="2" fill="#0A0A0A" opacity="0.3"/>
  <!-- Label -->
  <text x="300" y="740" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#0A0A0A" opacity="0.4" letter-spacing="6">MARKETING</text>
  <!-- Grain overlay -->
  <rect width="600" height="800" filter="url(#grain)" opacity="0.5" rx="12"/>
</svg>