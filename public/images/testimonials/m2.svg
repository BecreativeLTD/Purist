<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="11"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="100%" stop-color="#F4EFE6"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="12"/>
  <!-- Left circle -->
  <circle cx="160" cy="200" r="110" fill="none" stroke="#0A0A0A" stroke-width="1.2" opacity="0.4"/>
  <!-- Right circle -->
  <circle cx="240" cy="200" r="110" fill="none" stroke="#0A0A0A" stroke-width="1.2" opacity="0.4"/>
  <!-- Overlap area accent - vesica piscis shape -->
  <path d="M 200,107 A 110,110 0 0,1 200,293 A 110,110 0 0,1 200,107" fill="none" stroke="#A0522D" stroke-width="1.5" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="200" cy="200" r="4" fill="#A0522D" opacity="0.5"/>
  <!-- Circle center dots -->
  <circle cx="160" cy="200" r="2.5" fill="#0A0A0A" opacity="0.35"/>
  <circle cx="240" cy="200" r="2.5" fill="#0A0A0A" opacity="0.35"/>
  <!-- Horizontal line through centers -->
  <line x1="50" y1="200" x2="350" y2="200" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <!-- Vertical line through overlap -->
  <line x1="200" y1="90" x2="200" y2="310" stroke="#A0522D" stroke-width="0.5" opacity="0.3"/>
  <!-- Intersection points -->
  <circle cx="200" cy="107" r="3" fill="#A0522D" opacity="0.4"/>
  <circle cx="200" cy="293" r="3" fill="#A0522D" opacity="0.4"/>
  <!-- Outer tangent dots -->
  <circle cx="50" cy="200" r="2" fill="#0A0A0A" opacity="0.25"/>
  <circle cx="350" cy="200" r="2" fill="#0A0A0A" opacity="0.25"/>
  <!-- Grain overlay -->
  <rect width="400" height="400" filter="url(#grain)" opacity="0.5" rx="12"/>
</svg>