<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="14"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="100%" stop-color="#F4EFE6"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="12"/>
  <!-- Three concentric circles -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#0A0A0A" stroke-width="1.2" opacity="0.35"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#0A0A0A" stroke-width="1" opacity="0.4"/>
  <circle cx="200" cy="200" r="50" fill="none" stroke="#A0522D" stroke-width="1.5" opacity="0.5"/>
  <!-- 4 radial lines -->
  <line x1="200" y1="50" x2="200" y2="350" stroke="#0A0A0A" stroke-width="0.8" opacity="0.3"/>
  <line x1="50" y1="200" x2="350" y2="200" stroke="#0A0A0A" stroke-width="0.8" opacity="0.3"/>
  <line x1="94" y1="94" x2="306" y2="306" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <line x1="306" y1="94" x2="94" y2="306" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <!-- Center dot -->
  <circle cx="200" cy="200" r="4" fill="#A0522D" opacity="0.55"/>
  <!-- Intersection dots on inner circle (rust) -->
  <circle cx="200" cy="150" r="3" fill="#A0522D" opacity="0.45"/>
  <circle cx="250" cy="200" r="3" fill="#A0522D" opacity="0.45"/>
  <circle cx="200" cy="250" r="3" fill="#A0522D" opacity="0.45"/>
  <circle cx="150" cy="200" r="3" fill="#A0522D" opacity="0.45"/>
  <!-- Intersection dots on middle circle -->
  <circle cx="200" cy="100" r="2.5" fill="#0A0A0A" opacity="0.35"/>
  <circle cx="300" cy="200" r="2.5" fill="#0A0A0A" opacity="0.35"/>
  <circle cx="200" cy="300" r="2.5" fill="#0A0A0A" opacity="0.35"/>
  <circle cx="100" cy="200" r="2.5" fill="#0A0A0A" opacity="0.35"/>
  <!-- Intersection dots on outer circle -->
  <circle cx="200" cy="50" r="2.5" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="350" cy="200" r="2.5" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="200" cy="350" r="2.5" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="50" cy="200" r="2.5" fill="#0A0A0A" opacity="0.3"/>
  <!-- Diagonal intersection dots on outer circle -->
  <circle cx="306" cy="94" r="2" fill="#0A0A0A" opacity="0.25"/>
  <circle cx="306" cy="306" r="2" fill="#0A0A0A" opacity="0.25"/>
  <circle cx="94" cy="306" r="2" fill="#0A0A0A" opacity="0.25"/>
  <circle cx="94" cy="94" r="2" fill="#0A0A0A" opacity="0.25"/>
  <!-- Grain overlay -->
  <rect width="400" height="400" filter="url(#grain)" opacity="0.5" rx="12"/>
</svg>