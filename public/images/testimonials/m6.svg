<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="15"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="100%" stop-color="#F4EFE6"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="12"/>
  <!-- Hexagon -->
  <polygon points="200,60 330,130 330,270 200,340 70,270 70,130" fill="none" stroke="#0A0A0A" stroke-width="1.2" opacity="0.4"/>
  <!-- Internal triangulation - 6 triangles from center -->
  <line x1="200" y1="200" x2="200" y2="60" stroke="#0A0A0A" stroke-width="0.7" opacity="0.3"/>
  <line x1="200" y1="200" x2="330" y2="130" stroke="#0A0A0A" stroke-width="0.7" opacity="0.3"/>
  <line x1="200" y1="200" x2="330" y2="270" stroke="#0A0A0A" stroke-width="0.7" opacity="0.3"/>
  <line x1="200" y1="200" x2="200" y2="340" stroke="#0A0A0A" stroke-width="0.7" opacity="0.3"/>
  <line x1="200" y1="200" x2="70" y2="270" stroke="#0A0A0A" stroke-width="0.7" opacity="0.3"/>
  <line x1="200" y1="200" x2="70" y2="130" stroke="#0A0A0A" stroke-width="0.7" opacity="0.3"/>
  <!-- Two rust-filled triangles (top-right and bottom-left) -->
  <polygon points="200,200 200,60 330,130" fill="#A0522D" fill-opacity="0.08" stroke="#A0522D" stroke-width="0.8" opacity="0.4"/>
  <polygon points="200,200 200,340 70,270" fill="#A0522D" fill-opacity="0.08" stroke="#A0522D" stroke-width="0.8" opacity="0.4"/>
  <!-- Center dot -->
  <circle cx="200" cy="200" r="4" fill="#A0522D" opacity="0.5"/>
  <!-- Vertex dots -->
  <circle cx="200" cy="60" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="330" cy="130" r="3" fill="#A0522D" opacity="0.45"/>
  <circle cx="330" cy="270" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="200" cy="340" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="70" cy="270" r="3" fill="#A0522D" opacity="0.45"/>
  <circle cx="70" cy="130" r="3" fill="#0A0A0A" opacity="0.4"/>
  <!-- Edge midpoint dots -->
  <circle cx="265" cy="95" r="2" fill="#0A0A0A" opacity="0.25"/>
  <circle cx="330" cy="200" r="2" fill="#0A0A0A" opacity="0.25"/>
  <circle cx="265" cy="305" r="2" fill="#0A0A0A" opacity="0.25"/>
  <circle cx="135" cy="305" r="2" fill="#0A0A0A" opacity="0.25"/>
  <circle cx="70" cy="200" r="2" fill="#0A0A0A" opacity="0.25"/>
  <circle cx="135" cy="95" r="2" fill="#0A0A0A" opacity="0.25"/>
  <!-- Grain overlay -->
  <rect width="400" height="400" filter="url(#grain)" opacity="0.5" rx="12"/>
</svg>