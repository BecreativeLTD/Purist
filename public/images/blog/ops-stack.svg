<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720" width="1400" height="720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="100%" stop-color="#EDE5D5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.7" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#7B68EE" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7B68EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="6"/>
      <feColorMatrix values="0 0 0 0 0.6  0 0 0 0 0.55  0 0 0 0 0.48  0 0 0 0.05 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1400" height="720" fill="url(#bg)"/>
  <rect width="1400" height="720" fill="url(#glow)"/>

  <!-- Stacked layers (operations stack) -->
  <g fill="none">
    <!-- Layer 1 - Triggers -->
    <rect x="720" y="130" width="500" height="62" rx="6" stroke="#E8B4B0" stroke-width="1.2" opacity="0.5"/>
    <!-- Layer 2 - AI -->
    <rect x="740" y="210" width="460" height="62" rx="6" stroke="#C8B99A" stroke-width="1.2" opacity="0.45"/>
    <!-- Layer 3 - Logic -->
    <rect x="760" y="290" width="420" height="62" rx="6" stroke="#0A0A0A" stroke-width="1" opacity="0.2"/>
    <!-- Layer 4 - Integrations -->
    <rect x="780" y="370" width="380" height="62" rx="6" stroke="#2D5016" stroke-width="1.2" opacity="0.35"/>
    <!-- Layer 5 - Data -->
    <rect x="800" y="450" width="340" height="62" rx="6" stroke="#7B68EE" stroke-width="1.2" opacity="0.4"/>
    <!-- Layer 6 - Monitor -->
    <rect x="820" y="530" width="300" height="62" rx="6" stroke="#C89840" stroke-width="1.2" opacity="0.35"/>
  </g>

  <!-- Connecting lines left side -->
  <g stroke="#0A0A0A" stroke-width="0.6" opacity="0.12">
    <line x1="720" y1="161" x2="740" y2="210"/>
    <line x1="740" y1="241" x2="760" y2="290"/>
    <line x1="760" y1="321" x2="780" y2="370"/>
    <line x1="780" y1="401" x2="800" y2="450"/>
    <line x1="800" y1="481" x2="820" y2="530"/>
  </g>

  <text x="80" y="620" font-family="Inter, sans-serif" font-size="13" fill="#5248b8" letter-spacing="5" font-weight="500">OPERATIONS STACK</text>
  <text x="80" y="668" font-family="Georgia, serif" font-size="34" fill="#0A0A0A" font-weight="400">PURIST · Guide</text>
  <rect width="1400" height="720" filter="url(#grain)" opacity="0.5"/>
</svg>
