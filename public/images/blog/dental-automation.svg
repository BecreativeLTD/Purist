<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720" width="1400" height="720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="100%" stop-color="#EDE5D5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.28" r="0.5">
      <stop offset="0%" stop-color="#2D5016" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2D5016" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="9"/>
      <feColorMatrix values="0 0 0 0 0.6  0 0 0 0 0.55  0 0 0 0 0.48  0 0 0 0.05 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1400" height="720" fill="url(#bg)"/>
  <rect width="1400" height="720" fill="url(#glow)"/>

  <!-- Abstract workflow: 3 steps reducing admin -->
  <g fill="none">
    <!-- Step 1: Booking -->
    <rect x="720" y="160" width="120" height="80" rx="8" stroke="#2D5016" stroke-width="1.2" opacity="0.5"/>
    <line x1="840" y1="200" x2="920" y2="200" stroke="#2D5016" stroke-width="1" opacity="0.3" stroke-dasharray="4 4"/>
    <!-- Step 2: Insurance -->
    <rect x="920" y="160" width="120" height="80" rx="8" stroke="#2D5016" stroke-width="1.2" opacity="0.4"/>
    <line x1="1040" y1="200" x2="1120" y2="200" stroke="#2D5016" stroke-width="1" opacity="0.25" stroke-dasharray="4 4"/>
    <!-- Step 3: Confirmation -->
    <rect x="1120" y="160" width="120" height="80" rx="8" stroke="#2D5016" stroke-width="1.2" opacity="0.3"/>
  </g>

  <!-- Check marks inside boxes -->
  <g stroke="#2D5016" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="745,202 762,218 790,188" stroke-width="2" opacity="0.5"/>
    <polyline points="945,202 962,218 990,188" stroke-width="2" opacity="0.4"/>
    <polyline points="1145,202 1162,218 1190,188" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- 60% reduction graphic -->
  <text x="680" y="430" font-family="Georgia, serif" font-size="160" fill="#2D5016" opacity="0.07" font-weight="bold">60%</text>

  <!-- Circular stats -->
  <circle cx="780" cy="430" r="60" fill="none" stroke="#2D5016" stroke-width="1.2" opacity="0.2"/>
  <circle cx="780" cy="430" r="60" fill="none" stroke="#2D5016" stroke-width="3" opacity="0.4" stroke-dasharray="226.2 377" stroke-linecap="round" transform="rotate(-90 780 430)"/>

  <text x="80" y="620" font-family="Inter, sans-serif" font-size="13" fill="#2D5016" letter-spacing="5" font-weight="500">DENTAL AUTOMATION</text>
  <text x="80" y="668" font-family="Georgia, serif" font-size="34" fill="#0A0A0A" font-weight="400">PURIST · Case Study</text>
  <rect width="1400" height="720" filter="url(#grain)" opacity="0.5"/>
</svg>
