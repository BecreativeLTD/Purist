<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720" width="1400" height="720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="100%" stop-color="#EDE5D5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.68" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="#0A0A0A" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="11"/>
      <feColorMatrix values="0 0 0 0 0.6  0 0 0 0 0.55  0 0 0 0 0.48  0 0 0 0.05 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1400" height="720" fill="url(#bg)"/>
  <rect width="1400" height="720" fill="url(#glow)"/>

  <!-- Three columns: n8n, Make, Zapier -->
  <g fill="none" stroke="#0A0A0A" opacity="0.12" stroke-width="0.6">
    <line x1="860" y1="120" x2="860" y2="580"/>
    <line x1="1080" y1="120" x2="1080" y2="580"/>
    <line x1="700" y1="160" x2="1300" y2="160"/>
    <line x1="700" y1="220" x2="1300" y2="220"/>
    <line x1="700" y1="280" x2="1300" y2="280"/>
    <line x1="700" y1="340" x2="1300" y2="340"/>
    <line x1="700" y1="400" x2="1300" y2="400"/>
    <line x1="700" y1="460" x2="1300" y2="460"/>
  </g>

  <!-- Highlight n8n column (winner) -->
  <rect x="700" y="120" width="160" height="460" rx="4" fill="#E8B4B0" opacity="0.06"/>

  <!-- Check marks in n8n column -->
  <g stroke="#E8B4B0" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" opacity="0.6">
    <polyline points="758,178 768,190 790,165"/>
    <polyline points="758,238 768,250 790,225"/>
    <polyline points="758,298 768,310 790,285"/>
    <polyline points="758,358 768,370 790,345"/>
    <polyline points="758,418 768,430 790,405"/>
    <polyline points="758,478 768,490 790,465"/>
  </g>

  <!-- Large VS -->
  <text x="690" y="460" font-family="Georgia, serif" font-size="180" fill="#0A0A0A" opacity="0.04" font-weight="bold">vs</text>

  <text x="80" y="620" font-family="Inter, sans-serif" font-size="13" fill="#555" letter-spacing="5" font-weight="500">TOOLS COMPARISON</text>
  <text x="80" y="668" font-family="Georgia, serif" font-size="34" fill="#0A0A0A" font-weight="400">PURIST · 500 Deployments</text>
  <rect width="1400" height="720" filter="url(#grain)" opacity="0.5"/>
</svg>
