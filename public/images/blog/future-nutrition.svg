<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720" width="1400" height="720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <radialGradient id="gRose" cx="0.68" cy="0.38" r="0.52">
      <stop offset="0%" stop-color="#E8B4B0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#E8B4B0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gGreen" cx="0.18" cy="0.72" r="0.38">
      <stop offset="0%" stop-color="#2D5016" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2D5016" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="720" fill="url(#bg)"/>
  <rect width="1400" height="720" fill="url(#gRose)"/>
  <rect width="1400" height="720" fill="url(#gGreen)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.045)" stroke-width="1">
    <line x1="0" y1="120" x2="1400" y2="120"/>
    <line x1="0" y1="240" x2="1400" y2="240"/>
    <line x1="0" y1="360" x2="1400" y2="360"/>
    <line x1="0" y1="480" x2="1400" y2="480"/>
    <line x1="0" y1="600" x2="1400" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="720"/>
    <line x1="400" y1="0" x2="400" y2="720"/>
    <line x1="600" y1="0" x2="600" y2="720"/>
    <line x1="800" y1="0" x2="800" y2="720"/>
    <line x1="1000" y1="0" x2="1000" y2="720"/>
    <line x1="1200" y1="0" x2="1200" y2="720"/>
  </g>

  <!-- Central hub -->
  <circle cx="780" cy="310" r="38" fill="none" stroke="#E8B4B0" stroke-width="1.5" opacity="0.7"/>
  <circle cx="780" cy="310" r="22" fill="none" stroke="#E8B4B0" stroke-width="0.8" opacity="0.3"/>
  <circle cx="780" cy="310" r="7" fill="#E8B4B0" opacity="0.85"/>

  <!-- Pulse rings -->
  <circle cx="780" cy="310" r="58" fill="none" stroke="#E8B4B0" stroke-width="0.6" opacity="0.18"/>
  <circle cx="780" cy="310" r="88" fill="none" stroke="#E8B4B0" stroke-width="0.5" opacity="0.1"/>
  <circle cx="780" cy="310" r="125" fill="none" stroke="#E8B4B0" stroke-width="0.4" opacity="0.06"/>

  <!-- Satellite nodes -->
  <circle cx="555" cy="205" r="9" fill="none" stroke="#E8B4B0" stroke-width="1" opacity="0.55"/>
  <circle cx="555" cy="205" r="3.5" fill="#E8B4B0" opacity="0.7"/>

  <circle cx="972" cy="182" r="12" fill="none" stroke="#E8B4B0" stroke-width="1" opacity="0.45"/>
  <circle cx="972" cy="182" r="4.5" fill="#E8B4B0" opacity="0.6"/>

  <circle cx="638" cy="445" r="10" fill="none" stroke="#2D5016" stroke-width="1" opacity="0.6"/>
  <circle cx="638" cy="445" r="4" fill="#2D5016" opacity="0.8"/>

  <circle cx="990" cy="415" r="14" fill="none" stroke="#2D5016" stroke-width="1" opacity="0.5"/>
  <circle cx="990" cy="415" r="5" fill="#2D5016" opacity="0.65"/>

  <circle cx="415" cy="328" r="7" fill="none" stroke="#E8B4B0" stroke-width="1" opacity="0.4"/>
  <circle cx="415" cy="328" r="3" fill="#E8B4B0" opacity="0.55"/>

  <circle cx="1112" cy="288" r="9" fill="none" stroke="#E8B4B0" stroke-width="1" opacity="0.38"/>
  <circle cx="1112" cy="288" r="3.5" fill="#E8B4B0" opacity="0.5"/>

  <circle cx="840" cy="510" r="7" fill="none" stroke="#2D5016" stroke-width="1" opacity="0.45"/>
  <circle cx="840" cy="510" r="2.5" fill="#2D5016" opacity="0.6"/>

  <circle cx="1190" cy="452" r="5" fill="#E8B4B0" opacity="0.28"/>
  <circle cx="310" cy="488" r="5" fill="#2D5016" opacity="0.28"/>
  <circle cx="1068" cy="568" r="4" fill="#E8B4B0" opacity="0.2"/>

  <!-- Connection lines -->
  <g stroke="#E8B4B0" stroke-width="0.8" opacity="0.2">
    <line x1="780" y1="310" x2="555" y2="205"/>
    <line x1="780" y1="310" x2="972" y2="182"/>
    <line x1="780" y1="310" x2="415" y2="328"/>
    <line x1="780" y1="310" x2="1112" y2="288"/>
  </g>
  <g stroke="#2D5016" stroke-width="0.8" opacity="0.28">
    <line x1="780" y1="310" x2="638" y2="445"/>
    <line x1="780" y1="310" x2="990" y2="415"/>
    <line x1="780" y1="310" x2="840" y2="510"/>
  </g>
  <g stroke="#E8B4B0" stroke-width="1.5" stroke-dasharray="5 14" opacity="0.3">
    <line x1="780" y1="310" x2="555" y2="205"/>
    <line x1="780" y1="310" x2="972" y2="182"/>
  </g>
  <g stroke="#2D5016" stroke-width="1.5" stroke-dasharray="5 14" opacity="0.35">
    <line x1="780" y1="310" x2="638" y2="445"/>
    <line x1="780" y1="310" x2="990" y2="415"/>
  </g>

  <!-- Secondary connections -->
  <g stroke="rgba(255,255,255,0.08)" stroke-width="0.6">
    <line x1="555" y1="205" x2="415" y2="328"/>
    <line x1="972" y1="182" x2="1112" y2="288"/>
    <line x1="638" y1="445" x2="310" y2="488"/>
    <line x1="990" y1="415" x2="1190" y2="452"/>
    <line x1="840" y1="510" x2="1068" y2="568"/>
  </g>

  <!-- LABEL top-left — clearly readable -->
  <text x="80" y="86"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="11"
        font-weight="700"
        letter-spacing="5"
        fill="#E8B4B0"
        opacity="0.9">AUTOMATION ENGINEERING</text>

  <!-- Decorative top-left rule -->
  <rect x="80" y="94" width="48" height="1.5" fill="#E8B4B0" opacity="0.35"/>

  <!-- PURIST wordmark — centre-left, large, clearly visible -->
  <text x="80" y="620"
        font-family="Georgia,'Times New Roman',serif"
        font-size="72"
        font-weight="400"
        letter-spacing="-2"
        fill="#FFFFFF"
        opacity="0.96">PURIST</text>

  <!-- Eyebrow below wordmark -->
  <text x="84" y="648"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="11"
        font-weight="500"
        letter-spacing="3"
        fill="rgba(255,255,255,0.38)">ENGINEERING INSIGHTS  2026</text>

  <!-- Top-right corner accent lines -->
  <rect x="1318" y="0" width="82" height="1.5" fill="#E8B4B0" opacity="0.35"/>
  <rect x="1398" y="0" width="1.5" height="82" fill="#E8B4B0" opacity="0.35"/>
</svg>
