<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720" width="1400" height="720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="100%" stop-color="#EDE5D5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.65" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#C8B99A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C8B99A" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="12"/>
      <feColorMatrix values="0 0 0 0 0.6  0 0 0 0 0.55  0 0 0 0 0.48  0 0 0 0.05 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1400" height="720" fill="url(#bg)"/>
  <rect width="1400" height="720" fill="url(#glow)"/>

  <!-- Neural net pattern -->
  <g fill="none" stroke="#C8B99A">
    <!-- Hexagonal center -->
    <polygon points="900,240 960,275 960,345 900,380 840,345 840,275" stroke-width="1.2" opacity="0.45"/>
    <!-- Outer ring -->
    <polygon points="900,160 1000,215 1000,325 900,380 800,325 800,215" stroke-width="0.7" opacity="0.2" stroke-dasharray="5 5"/>
    <!-- Center dot -->
    <circle cx="900" cy="310" r="8" fill="#C8B99A" opacity="0.5"/>
    <!-- Connection lines -->
    <line x1="900" y1="240" x2="900" y2="160" stroke-width="0.8" opacity="0.3"/>
    <line x1="960" y1="275" x2="1000" y2="215" stroke-width="0.8" opacity="0.3"/>
    <line x1="960" y1="345" x2="1000" y2="325" stroke-width="0.8" opacity="0.3"/>
    <line x1="900" y1="380" x2="900" y2="460" stroke-width="0.8" opacity="0.2"/>
    <line x1="840" y1="345" x2="800" y2="325" stroke-width="0.8" opacity="0.3"/>
    <line x1="840" y1="275" x2="800" y2="215" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Outer nodes -->
  <g fill="#C8B99A" opacity="0.4">
    <circle cx="900" cy="148" r="12"/>
    <circle cx="1010" cy="205" r="10"/>
    <circle cx="1010" cy="335" r="10"/>
    <circle cx="790" cy="205" r="10"/>
    <circle cx="790" cy="335" r="10"/>
    <circle cx="900" cy="472" r="12"/>
  </g>

  <!-- Confidence bar -->
  <rect x="780" y="530" width="240" height="6" rx="3" fill="#0A0A0A" opacity="0.08"/>
  <rect x="780" y="530" width="204" height="6" rx="3" fill="#C8B99A" opacity="0.5"/>

  <text x="80" y="620" font-family="Inter, sans-serif" font-size="13" fill="#8a7a5e" letter-spacing="5" font-weight="500">AI AGENTS IN PRODUCTION</text>
  <text x="80" y="668" font-family="Georgia, serif" font-size="34" fill="#0A0A0A" font-weight="400">PURIST · Engineering</text>
  <rect width="1400" height="720" filter="url(#grain)" opacity="0.5"/>
</svg>
