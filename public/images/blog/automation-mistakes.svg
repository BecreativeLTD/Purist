  <text x="1072" y="212" font-family="Inter,Helvetica,sans-serif" font-size="9" fill="rgba(255,255,255,0.28)" font-weight="600" letter-spacing="3">THE 7 MISTAKES</text>
  <circle cx="1082" cy="238" r="5.5" fill="none" stroke="rgba(160,82,45,0.6)" stroke-width="1.2"/><circle cx="1082" cy="238" r="2.8" fill="#A0522D" opacity="0.8"/>
  <circle cx="1122" cy="238" r="5.5" fill="none" stroke="rgba(160,82,45,0.6)" stroke-width="1.2"/><circle cx="1122" cy="238" r="2.8" fill="#A0522D" opacity="0.8"/>
  <circle cx="1162" cy="238" r="5.5" fill="none" stroke="rgba(160,82,45,0.6)" stroke-width="1.2"/><circle cx="1162" cy="238" r="2.8" fill="#A0522D" opacity="0.8"/>
  <circle cx="1202" cy="238" r="5.5" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1"/><circle cx="1202" cy="238" r="2.8" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1242" cy="238" r="5.5" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1"/><circle cx="1242" cy="238" r="2.8" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1282" cy="238" r="5.5" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1"/><circle cx="1282" cy="238" r="2.8" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1322" cy="238" r="5.5" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1"/><circle cx="1322" cy="238" r="2.8" fill="rgba(255,255,255,0.1)"/>

  <!-- Label -->
  <text x="80" y="86" font-family="Inter,Helvetica,sans-serif" font-size="11" font-weight="700" letter-spacing="5" fill="#A0522D" opacity="0.9">ROI PROTECTION</text>
  <rect x="80" y="94" width="48" height="1.5" fill="#A0522D" opacity="0.4"/>

  <text x="80" y="620" font-family="Georgia,'Times New Roman',serif" font-size="72" font-weight="400" letter-spacing="-2" fill="#FFFFFF" opacity="0.96">PURIST</text>
  <text x="84" y="648" font-family="Inter,Helvetica,sans-serif" font-size="11" font-weight="500" letter-spacing="3" fill="rgba(255,255,255,0.38)">ENGINEERING INSIGHTS  2026</text>
