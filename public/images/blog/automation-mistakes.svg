  <text x="414" y="274" font-family="Inter,Helvetica,sans-serif" font-size="9.5" fill="rgba(200,130,80,0.55)" text-anchor="middle">transform · enrich</text>

  <line x1="488" y1="258" x2="552" y2="258" stroke="rgba(232,180,176,0.35)" stroke-width="1.5" stroke-dasharray="5 4"/>
  <polygon points="552,254 560,258 552,262" fill="rgba(232,180,176,0.35)"/>

  <!-- Error box -->
  <rect x="560" y="220" width="148" height="76" rx="8" fill="rgba(232,180,176,0.1)" stroke="rgba(232,180,176,0.4)" stroke-width="1.2" stroke-dasharray="6 3"/>
  <text x="634" y="257" font-family="Inter,Helvetica,sans-serif" font-size="12" fill="#E8B4B0" text-anchor="middle" font-weight="700">ERROR</text>
  <text x="634" y="274" font-family="Inter,Helvetica,sans-serif" font-size="9.5" fill="rgba(232,180,176,0.5)" text-anchor="middle">silent failure</text>

  <!-- X mark -->
  <line x1="778" y1="245" x2="796" y2="271" stroke="#E8B4B0" stroke-width="2" opacity="0.65"/>
  <line x1="796" y1="245" x2="778" y2="271" stroke="#E8B4B0" stroke-width="2" opacity="0.65"/>

  <line x1="708" y1="258" x2="820" y2="258" stroke="rgba(232,180,176,0.15)" stroke-width="1" stroke-dasharray="3 6"/>

  <rect x="828" y="220" width="148" height="76" rx="8" fill="rgba(45,80,22,0.16)" stroke="rgba(45,80,22,0.45)" stroke-width="1.2"/>
  <text x="902" y="257" font-family="Inter,Helvetica,sans-serif" font-size="12" fill="rgba(100,180,60,0.95)" text-anchor="middle" font-weight="700">DELIVER</text>
  <text x="902" y="274" font-family="Inter,Helvetica,sans-serif" font-size="9.5" fill="rgba(100,180,60,0.55)" text-anchor="middle">output · notify</text>

