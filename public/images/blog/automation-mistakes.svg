<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720" width="1400" height="720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#100908"/><stop offset="100%" stop-color="#140c0a"/></linearGradient>
    <radialGradient id="g1" cx="0.3" cy="0.4" r="0.55"><stop offset="0%" stop-color="#A0522D" stop-opacity="0.22"/><stop offset="100%" stop-color="#A0522D" stop-opacity="0"/></radialGradient>
    <radialGradient id="g2" cx="0.8" cy="0.65" r="0.4"><stop offset="0%" stop-color="#E8B4B0" stop-opacity="0.1"/><stop offset="100%" stop-color="#E8B4B0" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1400" height="720" fill="url(#bg)"/>
  <rect width="1400" height="720" fill="url(#g1)"/>
  <rect width="1400" height="720" fill="url(#g2)"/>

  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="180" x2="1400" y2="180"/><line x1="0" y1="360" x2="1400" y2="360"/><line x1="0" y1="540" x2="1400" y2="540"/>
    <line x1="280" y1="0" x2="280" y2="720"/><line x1="560" y1="0" x2="560" y2="720"/><line x1="840" y1="0" x2="840" y2="720"/><line x1="1120" y1="0" x2="1120" y2="720"/>
  </g>

  <!-- Pipeline steps -->
  <rect x="120" y="220" width="148" height="76" rx="8" fill="rgba(45,80,22,0.18)" stroke="rgba(45,80,22,0.5)" stroke-width="1.2"/>
  <text x="194" y="257" font-family="Inter,Helvetica,sans-serif" font-size="12" fill="rgba(100,180,60,0.95)" text-anchor="middle" font-weight="700">TRIGGER</text>
  <text x="194" y="274" font-family="Inter,Helvetica,sans-serif" font-size="9.5" fill="rgba(100,180,60,0.55)" text-anchor="middle">webhook · polling</text>

  <line x1="268" y1="258" x2="332" y2="258" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <polygon points="332,254 340,258 332,262" fill="rgba(255,255,255,0.2)"/>

  <rect x="340" y="220" width="148" height="76" rx="8" fill="rgba(160,82,45,0.16)" stroke="rgba(160,82,45,0.45)" stroke-width="1.2"/>
