  <line x1="634" y1="296" x2="634" y2="380" stroke="rgba(232,180,176,0.25)" stroke-width="1.2" stroke-dasharray="4 4"/>
  <polygon points="630,380 634,390 638,380" fill="rgba(232,180,176,0.25)"/>
  <rect x="534" y="390" width="200" height="72" rx="10" fill="rgba(232,180,176,0.08)" stroke="rgba(232,180,176,0.28)" stroke-width="1.2"/>
  <text x="634" y="425" font-family="Inter,Helvetica,sans-serif" font-size="11" fill="#E8B4B0" text-anchor="middle" font-weight="700">REVIEW QUEUE</text>
  <text x="634" y="443" font-family="Inter,Helvetica,sans-serif" font-size="9.5" fill="rgba(232,180,176,0.45)" text-anchor="middle">human escalation</text>

