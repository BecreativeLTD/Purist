  <circle cx="200" cy="185" r="145" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.07"/>
  <circle cx="200" cy="185" r="155" fill="none" stroke="#A0522D" stroke-width="0.3" opacity="0.05" stroke-dasharray="3 7"/>
