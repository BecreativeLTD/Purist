<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="1"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="100%" stop-color="#F4EFE6"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="12"/>
  <!-- Outer orbital -->
  <circle cx="200" cy="185" r="145" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.07"/>
  <circle cx="200" cy="185" r="155" fill="none" stroke="#2D5016" stroke-width="0.3" opacity="0.05" stroke-dasharray="3 7"/>
  <!-- Expanding hexagonal grid -->
  <!-- Center hexagon -->
  <polygon points="200,160 222,172 222,197 200,209 178,197 178,172" fill="none" stroke="#2D5016" stroke-width="1.8" opacity="0.7"/>
  <!-- Ring 1 - 6 hexagons around center -->
  <!-- Top -->
  <polygon points="200,110 222,122 222,147 200,159 178,147 178,122" fill="none" stroke="#2D5016" stroke-width="1" opacity="0.45"/>
  <!-- Top-right -->
  <polygon points="244,135 266,147 266,172 244,184 222,172 222,147" fill="none" stroke="#2D5016" stroke-width="1" opacity="0.45"/>
  <!-- Bottom-right -->
  <polygon points="244,185 266,197 266,222 244,234 222,222 222,197" fill="none" stroke="#2D5016" stroke-width="1" opacity="0.45"/>
  <!-- Bottom -->
  <polygon points="200,210 222,222 222,247 200,259 178,247 178,222" fill="none" stroke="#2D5016" stroke-width="1" opacity="0.45"/>
  <!-- Bottom-left -->
  <polygon points="156,185 178,197 178,222 156,234 134,222 134,197" fill="none" stroke="#2D5016" stroke-width="1" opacity="0.45"/>
  <!-- Top-left -->
  <polygon points="156,135 178,147 178,172 156,184 134,172 134,147" fill="none" stroke="#2D5016" stroke-width="1" opacity="0.45"/>
  <!-- Ring 2 - partial outer hexagons (fading out) -->
  <!-- Top -->
  <polygon points="200,60 222,72 222,97 200,109 178,97 178,72" fill="none" stroke="#2D5016" stroke-width="0.5" opacity="0.18"/>
  <!-- Top-right upper -->
  <polygon points="244,85 266,97 266,122 244,134 222,122 222,97" fill="none" stroke="#2D5016" stroke-width="0.5" opacity="0.18"/>
  <!-- Right -->
  <polygon points="288,160 310,172 310,197 288,209 266,197 266,172" fill="none" stroke="#2D5016" stroke-width="0.5" opacity="0.15"/>
  <!-- Bottom-right lower -->
  <polygon points="244,235 266,247 266,272 244,284 222,272 222,247" fill="none" stroke="#2D5016" stroke-width="0.5" opacity="0.15"/>
  <!-- Bottom -->
  <polygon points="200,260 222,272 222,297 200,309 178,297 178,272" fill="none" stroke="#2D5016" stroke-width="0.5" opacity="0.15"/>
  <!-- Left -->
  <polygon points="112,160 134,172 134,197 112,209 90,197 90,172" fill="none" stroke="#2D5016" stroke-width="0.5" opacity="0.15"/>
  <!-- Top-left upper -->
  <polygon points="156,85 178,97 178,122 156,134 134,122 134,97" fill="none" stroke="#2D5016" stroke-width="0.5" opacity="0.18"/>
  <!-- Center dot -->
  <circle cx="200" cy="185" r="4" fill="#2D5016" opacity="0.7"/>
  <!-- Vertex highlights -->
  <circle cx="200" cy="160" r="1.5" fill="#2D5016" opacity="0.4"/>
  <circle cx="222" cy="172" r="1.5" fill="#2D5016" opacity="0.4"/>
  <circle cx="222" cy="197" r="1.5" fill="#2D5016" opacity="0.4"/>
  <circle cx="200" cy="209" r="1.5" fill="#2D5016" opacity="0.4"/>
  <circle cx="178" cy="197" r="1.5" fill="#2D5016" opacity="0.4"/>
  <circle cx="178" cy="172" r="1.5" fill="#2D5016" opacity="0.4"/>
  <!-- Role label -->
  <text x="200" y="368" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6B6B6B" letter-spacing="0.5">Scale Operations Architect</text>
  <!-- Grain -->
  <rect width="400" height="400" filter="url(#grain)" opacity="0.5" rx="12"/>
</svg>