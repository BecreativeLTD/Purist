<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="1"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="100%" stop-color="#F4EFE6"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="12"/>
  <!-- Outer orbital -->
  <circle cx="200" cy="185" r="145" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.07"/>
  <circle cx="200" cy="185" r="155" fill="none" stroke="#2D5016" stroke-width="0.3" opacity="0.05" stroke-dasharray="3 7"/>
  <!-- Pentagon nodes - 5 vertices -->
  <!-- Top -->
  <circle cx="200" cy="115" r="6" fill="none" stroke="#2D5016" stroke-width="1.8" opacity="0.8"/>
  <circle cx="200" cy="115" r="2.5" fill="#2D5016" opacity="0.9"/>
  <!-- Top-right -->
  <circle cx="266" cy="163" r="6" fill="none" stroke="#2D5016" stroke-width="1.8" opacity="0.8"/>
  <circle cx="266" cy="163" r="2.5" fill="#2D5016" opacity="0.9"/>
  <!-- Bottom-right -->
  <circle cx="241" cy="240" r="6" fill="none" stroke="#2D5016" stroke-width="1.8" opacity="0.8"/>
  <circle cx="241" cy="240" r="2.5" fill="#2D5016" opacity="0.9"/>
  <!-- Bottom-left -->
  <circle cx="159" cy="240" r="6" fill="none" stroke="#2D5016" stroke-width="1.8" opacity="0.8"/>
  <circle cx="159" cy="240" r="2.5" fill="#2D5016" opacity="0.9"/>
  <!-- Top-left -->
  <circle cx="134" cy="163" r="6" fill="none" stroke="#2D5016" stroke-width="1.8" opacity="0.8"/>
  <circle cx="134" cy="163" r="2.5" fill="#2D5016" opacity="0.9"/>
  <!-- Pentagon edges -->
  <line x1="200" y1="115" x2="266" y2="163" stroke="#0A0A0A" stroke-width="1" opacity="0.4"/>
  <line x1="266" y1="163" x2="241" y2="240" stroke="#0A0A0A" stroke-width="1" opacity="0.4"/>
  <line x1="241" y1="240" x2="159" y2="240" stroke="#0A0A0A" stroke-width="1" opacity="0.4"/>
  <line x1="159" y1="240" x2="134" y2="163" stroke="#0A0A0A" stroke-width="1" opacity="0.4"/>
  <line x1="134" y1="163" x2="200" y2="115" stroke="#0A0A0A" stroke-width="1" opacity="0.4"/>
  <!-- Internal connections (star pattern) -->
  <line x1="200" y1="115" x2="241" y2="240" stroke="#2D5016" stroke-width="0.6" opacity="0.2"/>
  <line x1="200" y1="115" x2="159" y2="240" stroke="#2D5016" stroke-width="0.6" opacity="0.2"/>
  <line x1="266" y1="163" x2="159" y2="240" stroke="#2D5016" stroke-width="0.6" opacity="0.2"/>
  <line x1="266" y1="163" x2="134" y2="163" stroke="#2D5016" stroke-width="0.6" opacity="0.15"/>
  <line x1="241" y1="240" x2="134" y2="163" stroke="#2D5016" stroke-width="0.6" opacity="0.2"/>
  <!-- Center node -->
  <circle cx="200" cy="185" r="5" fill="#2D5016" opacity="0.6"/>
  <circle cx="200" cy="185" r="9" fill="none" stroke="#2D5016" stroke-width="0.8" opacity="0.3"/>
  <!-- Center connections -->
  <line x1="200" y1="185" x2="200" y2="115" stroke="#2D5016" stroke-width="0.5" opacity="0.15" stroke-dasharray="2 3"/>
  <line x1="200" y1="185" x2="266" y2="163" stroke="#2D5016" stroke-width="0.5" opacity="0.15" stroke-dasharray="2 3"/>
  <line x1="200" y1="185" x2="241" y2="240" stroke="#2D5016" stroke-width="0.5" opacity="0.15" stroke-dasharray="2 3"/>
  <line x1="200" y1="185" x2="159" y2="240" stroke="#2D5016" stroke-width="0.5" opacity="0.15" stroke-dasharray="2 3"/>
  <line x1="200" y1="185" x2="134" y2="163" stroke="#2D5016" stroke-width="0.5" opacity="0.15" stroke-dasharray="2 3"/>
  <!-- Subtle mid-edge nodes -->
  <circle cx="233" cy="139" r="1.8" fill="#2D5016" opacity="0.35"/>
  <circle cx="253" cy="201" r="1.8" fill="#2D5016" opacity="0.35"/>
  <circle cx="200" cy="240" r="1.8" fill="#2D5016" opacity="0.35"/>
  <circle cx="147" cy="201" r="1.8" fill="#2D5016" opacity="0.35"/>
  <circle cx="167" cy="139" r="1.8" fill="#2D5016" opacity="0.35"/>
  <!-- Role label -->
  <text x="200" y="368" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6B6B6B" letter-spacing="0.5">Data Integration Specialist</text>
  <!-- Grain -->
  <rect width="400" height="400" filter="url(#grain)" opacity="0.5" rx="12"/>
</svg>