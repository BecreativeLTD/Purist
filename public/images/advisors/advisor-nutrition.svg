<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="1"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="100%" stop-color="#F4EFE6"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="12"/>
  <!-- Outer orbital -->
  <circle cx="200" cy="185" r="145" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.07"/>
  <circle cx="200" cy="185" r="155" fill="none" stroke="#A0522D" stroke-width="0.3" opacity="0.05" stroke-dasharray="3 7"/>
  <!-- Branching tree / hierarchy -->
  <!-- Main trunk -->
  <line x1="200" y1="260" x2="200" y2="160" stroke="#0A0A0A" stroke-width="1.8" opacity="0.55"/>
  <!-- Root node -->
  <circle cx="200" cy="265" r="5" fill="#A0522D" opacity="0.7"/>
  <!-- Level 1 split -->
  <line x1="200" y1="200" x2="150" y2="165" stroke="#0A0A0A" stroke-width="1.2" opacity="0.45"/>
  <line x1="200" y1="200" x2="250" y2="165" stroke="#0A0A0A" stroke-width="1.2" opacity="0.45"/>
  <!-- Level 1 nodes -->
  <circle cx="200" cy="200" r="3.5" fill="#0A0A0A" opacity="0.55"/>
  <circle cx="150" cy="165" r="4" fill="#2D5016" opacity="0.65"/>
  <circle cx="250" cy="165" r="4" fill="#A0522D" opacity="0.65"/>
  <circle cx="200" cy="160" r="4" fill="#0A0A0A" opacity="0.5"/>
  <!-- Level 2 branches - left -->
  <line x1="150" y1="165" x2="120" y2="135" stroke="#2D5016" stroke-width="0.9" opacity="0.35"/>
  <line x1="150" y1="165" x2="155" y2="130" stroke="#2D5016" stroke-width="0.9" opacity="0.35"/>
  <!-- Level 2 branches - center -->
  <line x1="200" y1="160" x2="185" y2="128" stroke="#0A0A0A" stroke-width="0.9" opacity="0.3"/>
  <line x1="200" y1="160" x2="215" y2="128" stroke="#0A0A0A" stroke-width="0.9" opacity="0.3"/>
  <!-- Level 2 branches - right -->
  <line x1="250" y1="165" x2="245" y2="130" stroke="#A0522D" stroke-width="0.9" opacity="0.35"/>
  <line x1="250" y1="165" x2="280" y2="135" stroke="#A0522D" stroke-width="0.9" opacity="0.35"/>
  <!-- Level 2 nodes -->
  <circle cx="120" cy="135" r="3" fill="#2D5016" opacity="0.55"/>
  <circle cx="155" cy="130" r="3" fill="#2D5016" opacity="0.55"/>
  <circle cx="185" cy="128" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="215" cy="128" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="245" cy="130" r="3" fill="#A0522D" opacity="0.55"/>
  <circle cx="280" cy="135" r="3" fill="#A0522D" opacity="0.55"/>
  <!-- Level 3 - leaf dots (smaller, fading) -->
  <line x1="120" y1="135" x2="108" y2="112" stroke="#2D5016" stroke-width="0.5" opacity="0.2"/>
  <line x1="120" y1="135" x2="130" y2="110" stroke="#2D5016" stroke-width="0.5" opacity="0.2"/>
  <circle cx="108" cy="112" r="2" fill="#2D5016" opacity="0.35"/>
  <circle cx="130" cy="110" r="2" fill="#2D5016" opacity="0.35"/>
  <line x1="280" y1="135" x2="270" y2="110" stroke="#A0522D" stroke-width="0.5" opacity="0.2"/>
  <line x1="280" y1="135" x2="292" y2="112" stroke="#A0522D" stroke-width="0.5" opacity="0.2"/>
  <circle cx="270" cy="110" r="2" fill="#A0522D" opacity="0.35"/>
  <circle cx="292" cy="112" r="2" fill="#A0522D" opacity="0.35"/>
  <line x1="155" y1="130" x2="148" y2="108" stroke="#2D5016" stroke-width="0.5" opacity="0.2"/>
  <line x1="245" y1="130" x2="252" y2="108" stroke="#A0522D" stroke-width="0.5" opacity="0.2"/>
  <circle cx="148" cy="108" r="1.8" fill="#2D5016" opacity="0.3"/>
  <circle cx="252" cy="108" r="1.8" fill="#A0522D" opacity="0.3"/>
  <!-- Root extensions -->
  <line x1="200" y1="265" x2="185" y2="280" stroke="#0A0A0A" stroke-width="0.6" opacity="0.2"/>
  <line x1="200" y1="265" x2="215" y2="280" stroke="#0A0A0A" stroke-width="0.6" opacity="0.2"/>
  <circle cx="185" cy="280" r="1.5" fill="#0A0A0A" opacity="0.2"/>
  <circle cx="215" cy="280" r="1.5" fill="#0A0A0A" opacity="0.2"/>
  <!-- Role label -->
  <text x="200" y="368" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6B6B6B" letter-spacing="0.5">Industry Verticals Lead</text>
  <!-- Grain -->
  <rect width="400" height="400" filter="url(#grain)" opacity="0.5" rx="12"/>
</svg>