<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="1"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="100%" stop-color="#F4EFE6"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="12"/>
  <!-- Outer orbital -->
  <circle cx="200" cy="185" r="145" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.07"/>
  <circle cx="200" cy="185" r="155" fill="none" stroke="#2D5016" stroke-width="0.3" opacity="0.05" stroke-dasharray="3 7"/>
  <!-- Two curved arcs meeting - handshake/connection -->
  <!-- Left arc -->
  <path d="M120,185 Q140,125 200,145" fill="none" stroke="#0A0A0A" stroke-width="1.8" opacity="0.5"/>
  <!-- Right arc -->
  <path d="M280,185 Q260,125 200,145" fill="none" stroke="#0A0A0A" stroke-width="1.8" opacity="0.5"/>
  <!-- Lower left arc -->
  <path d="M120,185 Q140,245 200,225" fill="none" stroke="#2D5016" stroke-width="1" opacity="0.3"/>
  <!-- Lower right arc -->
  <path d="M280,185 Q260,245 200,225" fill="none" stroke="#2D5016" stroke-width="1" opacity="0.3"/>
  <!-- Shared center node (meeting point) -->
  <circle cx="200" cy="145" r="7" fill="#2D5016" opacity="0.15"/>
  <circle cx="200" cy="145" r="4.5" fill="#2D5016" opacity="0.7"/>
  <!-- Lower shared node -->
  <circle cx="200" cy="225" r="3.5" fill="#2D5016" opacity="0.45"/>
  <!-- Side anchor nodes -->
  <circle cx="120" cy="185" r="5" fill="#0A0A0A" opacity="0.5"/>
  <circle cx="120" cy="185" r="8" fill="none" stroke="#0A0A0A" stroke-width="0.6" opacity="0.2"/>
  <circle cx="280" cy="185" r="5" fill="#0A0A0A" opacity="0.5"/>
  <circle cx="280" cy="185" r="8" fill="none" stroke="#0A0A0A" stroke-width="0.6" opacity="0.2"/>
  <!-- Connecting line through center -->
  <line x1="120" y1="185" x2="280" y2="185" stroke="#2D5016" stroke-width="0.5" opacity="0.12" stroke-dasharray="2 4"/>
  <!-- Vertical axis line -->
  <line x1="200" y1="145" x2="200" y2="225" stroke="#2D5016" stroke-width="0.5" opacity="0.15" stroke-dasharray="2 4"/>
  <!-- Radiating connection dots from center top -->
  <circle cx="170" cy="135" r="2" fill="#2D5016" opacity="0.35"/>
  <circle cx="230" cy="135" r="2" fill="#2D5016" opacity="0.35"/>
  <line x1="200" y1="145" x2="170" y2="135" stroke="#2D5016" stroke-width="0.4" opacity="0.2"/>
  <line x1="200" y1="145" x2="230" y2="135" stroke="#2D5016" stroke-width="0.4" opacity="0.2"/>
  <!-- Small orbital dots -->
  <circle cx="155" cy="152" r="1.5" fill="#2D5016" opacity="0.3"/>
  <circle cx="245" cy="152" r="1.5" fill="#2D5016" opacity="0.3"/>
  <circle cx="155" cy="218" r="1.5" fill="#2D5016" opacity="0.2"/>
  <circle cx="245" cy="218" r="1.5" fill="#2D5016" opacity="0.2"/>
  <!-- Outer arc echoes (very subtle) -->
  <path d="M135,185 Q152,135 200,152" fill="none" stroke="#2D5016" stroke-width="0.4" opacity="0.12"/>
  <path d="M265,185 Q248,135 200,152" fill="none" stroke="#2D5016" stroke-width="0.4" opacity="0.12"/>
  <!-- Small pulse rings at center -->
  <circle cx="200" cy="145" r="15" fill="none" stroke="#2D5016" stroke-width="0.4" opacity="0.1"/>
  <circle cx="200" cy="145" r="25" fill="none" stroke="#2D5016" stroke-width="0.3" opacity="0.06"/>
  <!-- Role label -->
  <text x="200" y="368" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6B6B6B" letter-spacing="0.5">Client Success Engineer</text>
  <!-- Grain -->
  <rect width="400" height="400" filter="url(#grain)" opacity="0.5" rx="12"/>
</svg>