<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="5"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="100%" stop-color="#F4EFE6"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="12"/>
  <!-- Outer orbital -->
  <circle cx="200" cy="185" r="145" fill="none" stroke="#0A0A0A" stroke-width="0.4" opacity="0.07"/>
  <circle cx="200" cy="185" r="155" fill="none" stroke="#0A0A0A" stroke-width="0.3" opacity="0.04" stroke-dasharray="3 7"/>
  <!-- Shield — outer -->
  <path d="M200,105 L265,140 L265,210 Q265,250 200,275 Q135,250 135,210 L135,140 Z" fill="none" stroke="#0A0A0A" stroke-width="1.5" opacity="0.5"/>
  <!-- Shield — middle -->
  <path d="M200,120 L250,148 L250,205 Q250,238 200,258 Q150,238 150,205 L150,148 Z" fill="none" stroke="#0A0A0A" stroke-width="1" opacity="0.3"/>
  <!-- Shield — inner (rust accent) -->
  <path d="M200,138 L233,157 L233,198 Q233,222 200,238 Q167,222 167,198 L167,157 Z" fill="none" stroke="#A0522D" stroke-width="1.2" opacity="0.45"/>
  <!-- Shield — core (subtle fill) -->
  <path d="M200,158 L218,168 L218,192 Q218,208 200,218 Q182,208 182,192 L182,168 Z" fill="#0A0A0A" fill-opacity="0.04" stroke="#A0522D" stroke-width="0.8" stroke-opacity="0.35"/>
  <!-- Keyhole -->
  <circle cx="200" cy="178" r="6" fill="none" stroke="#0A0A0A" stroke-width="1.2" opacity="0.55"/>
  <circle cx="200" cy="178" r="2.5" fill="#0A0A0A" opacity="0.45"/>
  <line x1="200" y1="184" x2="200" y2="198" stroke="#0A0A0A" stroke-width="1.2" opacity="0.45"/>
  <!-- Horizontal accent lines -->
  <line x1="155" y1="165" x2="170" y2="165" stroke="#A0522D" stroke-width="0.6" opacity="0.3"/>
  <line x1="230" y1="165" x2="245" y2="165" stroke="#A0522D" stroke-width="0.6" opacity="0.3"/>
  <line x1="145" y1="185" x2="160" y2="185" stroke="#A0522D" stroke-width="0.6" opacity="0.3"/>
  <line x1="240" y1="185" x2="255" y2="185" stroke="#A0522D" stroke-width="0.6" opacity="0.3"/>
  <!-- Corner nodes -->
  <circle cx="200" cy="105" r="3" fill="#0A0A0A" opacity="0.55"/>
  <circle cx="265" cy="140" r="2" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="135" cy="140" r="2" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="200" cy="275" r="2.5" fill="#A0522D" opacity="0.4"/>
  <!-- Role label -->
  <text x="200" y="368" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#6B6B6B" letter-spacing="0.5">Security &amp; Compliance</text>
  <!-- Grain -->
  <rect width="400" height="400" filter="url(#grain)" opacity="0.5" rx="12"/>
</svg>
