<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="13"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="100%" stop-color="#F4EFE6"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="12"/>
  <!-- Square -->
  <rect x="70" y="70" width="260" height="260" fill="none" stroke="#0A0A0A" stroke-width="1.2" opacity="0.4" rx="2"/>
  <!-- Diagonal cross - one in rust -->
  <line x1="70" y1="70" x2="330" y2="330" stroke="#A0522D" stroke-width="1.2" opacity="0.45"/>
  <line x1="330" y1="70" x2="70" y2="330" stroke="#0A0A0A" stroke-width="1" opacity="0.35"/>
  <!-- Horizontal and vertical center lines -->
  <line x1="70" y1="200" x2="330" y2="200" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <line x1="200" y1="70" x2="200" y2="330" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
  <!-- Corner dots -->
  <circle cx="70" cy="70" r="4" fill="#A0522D" opacity="0.45"/>
  <circle cx="330" cy="70" r="4" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="330" cy="330" r="4" fill="#A0522D" opacity="0.45"/>
  <circle cx="70" cy="330" r="4" fill="#0A0A0A" opacity="0.4"/>
  <!-- Center dot -->
  <circle cx="200" cy="200" r="4" fill="#A0522D" opacity="0.5"/>
  <!-- Midpoint dots on edges -->
  <circle cx="200" cy="70" r="2.5" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="330" cy="200" r="2.5" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="200" cy="330" r="2.5" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="70" cy="200" r="2.5" fill="#0A0A0A" opacity="0.3"/>
  <!-- Quarter-diagonal dots -->
  <circle cx="135" cy="135" r="2" fill="#A0522D" opacity="0.35"/>
  <circle cx="265" cy="265" r="2" fill="#A0522D" opacity="0.35"/>
  <circle cx="265" cy="135" r="2" fill="#0A0A0A" opacity="0.25"/>
  <circle cx="135" cy="265" r="2" fill="#0A0A0A" opacity="0.25"/>
  <!-- Grain overlay -->
  <rect width="400" height="400" filter="url(#grain)" opacity="0.5" rx="12"/>
</svg>