<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="16"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="100%" stop-color="#F4EFE6"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="12"/>
  <!-- 8 parallel lines -->
  <line x1="60" y1="80" x2="340" y2="80" stroke="#0A0A0A" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="120" x2="340" y2="120" stroke="#0A0A0A" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="160" x2="340" y2="160" stroke="#0A0A0A" stroke-width="1" opacity="0.35"/>
  <line x1="60" y1="200" x2="340" y2="200" stroke="#A0522D" stroke-width="1.5" opacity="0.5"/>
  <line x1="60" y1="240" x2="340" y2="240" stroke="#0A0A0A" stroke-width="1" opacity="0.35"/>
  <line x1="60" y1="280" x2="340" y2="280" stroke="#0A0A0A" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="320" x2="340" y2="320" stroke="#0A0A0A" stroke-width="1" opacity="0.3"/>
  <!-- Endpoint dots left -->
  <circle cx="60" cy="80" r="2" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="60" cy="120" r="2" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="60" cy="160" r="2" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="60" cy="200" r="3" fill="#A0522D" opacity="0.45"/>
  <circle cx="60" cy="240" r="2" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="60" cy="280" r="2" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="60" cy="320" r="2" fill="#0A0A0A" opacity="0.3"/>
  <!-- Endpoint dots right -->
  <circle cx="340" cy="80" r="2" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="340" cy="120" r="2" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="340" cy="160" r="2" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="340" cy="200" r="3" fill="#A0522D" opacity="0.45"/>
  <circle cx="340" cy="240" r="2" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="340" cy="280" r="2" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="340" cy="320" r="2" fill="#0A0A0A" opacity="0.3"/>
  <!-- Midpoint dots -->
  <circle cx="200" cy="80" r="1.5" fill="#0A0A0A" opacity="0.2"/>
  <circle cx="200" cy="120" r="1.5" fill="#0A0A0A" opacity="0.2"/>
  <circle cx="200" cy="160" r="1.5" fill="#0A0A0A" opacity="0.2"/>
  <circle cx="200" cy="200" r="3" fill="#A0522D" opacity="0.5"/>
  <circle cx="200" cy="240" r="1.5" fill="#0A0A0A" opacity="0.2"/>
  <circle cx="200" cy="280" r="1.5" fill="#0A0A0A" opacity="0.2"/>
  <circle cx="200" cy="320" r="1.5" fill="#0A0A0A" opacity="0.2"/>
  <!-- Subtle vertical connectors -->
  <line x1="60" y1="80" x2="60" y2="320" stroke="#0A0A0A" stroke-width="0.4" opacity="0.15"/>
  <line x1="340" y1="80" x2="340" y2="320" stroke="#0A0A0A" stroke-width="0.4" opacity="0.15"/>
  <!-- Grain overlay -->
  <rect width="400" height="400" filter="url(#grain)" opacity="0.5" rx="12"/>
</svg>