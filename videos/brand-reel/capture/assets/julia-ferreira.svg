<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="12"/>
      <feColorMatrix values="0 0 0 0 0.6 0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0.06 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#F8F6F1"/>
      <stop offset="100%" stop-color="#F4EFE6"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="12"/>
  <!-- Pentagon -->
  <polygon points="200,60 330,154 280,310 120,310 70,154" fill="none" stroke="#0A0A0A" stroke-width="1.2" opacity="0.4"/>
  <!-- Inscribed star (pentagram) -->
  <polygon points="200,60 120,310 330,154 70,154 280,310" fill="none" stroke="#0A0A0A" stroke-width="0.8" opacity="0.3"/>
  <!-- Inner pentagon formed by star intersections -->
  <polygon points="200,148 258,232 238,290 162,290 142,232" fill="none" stroke="#0A0A0A" stroke-width="0.6" opacity="0.35"/>
  <!-- Center dot in rust -->
  <circle cx="200" cy="220" r="5" fill="#A0522D" opacity="0.5"/>
  <!-- Pentagon vertex dots -->
  <circle cx="200" cy="60" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="330" cy="154" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="280" cy="310" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="120" cy="310" r="3" fill="#0A0A0A" opacity="0.4"/>
  <circle cx="70" cy="154" r="3" fill="#0A0A0A" opacity="0.4"/>
  <!-- Star intersection dots -->
  <circle cx="200" cy="148" r="2" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="258" cy="232" r="2" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="238" cy="290" r="2" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="162" cy="290" r="2" fill="#0A0A0A" opacity="0.3"/>
  <circle cx="142" cy="232" r="2" fill="#0A0A0A" opacity="0.3"/>
  <!-- Radial lines from center to vertices -->
  <line x1="200" y1="220" x2="200" y2="60" stroke="#0A0A0A" stroke-width="0.4" opacity="0.2"/>
  <line x1="200" y1="220" x2="330" y2="154" stroke="#0A0A0A" stroke-width="0.4" opacity="0.2"/>
  <line x1="200" y1="220" x2="280" y2="310" stroke="#0A0A0A" stroke-width="0.4" opacity="0.2"/>
  <line x1="200" y1="220" x2="120" y2="310" stroke="#0A0A0A" stroke-width="0.4" opacity="0.2"/>
  <line x1="200" y1="220" x2="70" y2="154" stroke="#0A0A0A" stroke-width="0.4" opacity="0.2"/>
  <!-- Grain overlay -->
  <rect width="400" height="400" filter="url(#grain)" opacity="0.5" rx="12"/>
</svg>