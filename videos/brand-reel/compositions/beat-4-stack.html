<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    @font-face {
      font-family: "Fraunces";
      src: url("../capture/assets/fonts/fraunces-latin-opsz-normal.DihXLNYH.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: "Inter";
      src: url("../capture/assets/fonts/inter-latin-standard-normal.BwkfbSeq.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    #beat-4 {
      background: #F8F6F1;
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    .depth-svg {
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 110%;
      height: auto;
      opacity: 0;
      filter: blur(1px);
      pointer-events: none;
    }

    .scene-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 80px 60px;
      box-sizing: border-box;
      gap: 40px;
      position: relative;
      z-index: 1;
    }

    .stack-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .eyebrow {
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 10px;
      font-variation-settings: 'wght' 600;
      color: rgba(10,10,10,0.35);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0;
    }

    .stack-headline {
      font-family: "Fraunces", serif;
      font-size: 44px;
      font-variation-settings: 'wght' 400, 'opsz' 40;
      color: #0A0A0A;
      text-align: center;
      line-height: 1.1;
      opacity: 0;
    }

    .chip-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      width: 100%;
    }

    .chip {
      background: rgba(232,180,176,0.10);
      border: 1px solid rgba(196,132,126,0.20);
      border-radius: 9999px;
      padding: 8px 16px;
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 13px;
      font-variation-settings: 'wght' 500;
      color: #0A0A0A;
      text-align: center;
      white-space: nowrap;
      opacity: 0;
    }

    .rule-divider {
      width: 60px;
      height: 1px;
      background: rgba(10,10,10,0.12);
      opacity: 0;
    }

    .sub-caption {
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 14px;
      font-variation-settings: 'wght' 400;
      color: rgba(10,10,10,0.45);
      text-align: center;
      line-height: 1.5;
      max-width: 600px;
      opacity: 0;
    }
  </style>
</head>
<body>
  <template id="beat-4-template">
    <div data-composition-id="beat-4" data-start="0" data-duration="7.76" data-width="1080" data-height="1920">

      <img
        class="depth-svg"
        id="b4-depth"
        src="../capture/assets/the-full-stack-packaging.svg"
        alt=""
        data-layout-ignore
      />

      <div class="scene-content">

        <div class="stack-header">
          <p class="eyebrow" id="b4-eyebrow">400+ NODES · YOUR ENTIRE STACK</p>
          <h2 class="stack-headline" id="b4-headline">Everything connected.<br/>Nothing manual.</h2>
        </div>

        <div class="chip-grid">
          <div class="chip" id="b4-c1">CRM &amp; Sales</div>
          <div class="chip" id="b4-c2">Payments</div>
          <div class="chip" id="b4-c3">Email</div>
          <div class="chip" id="b4-c4">Documents</div>
          <div class="chip" id="b4-c5">AI &amp; LLMs</div>
          <div class="chip" id="b4-c6">E-commerce</div>
          <div class="chip" id="b4-c7">Project Mgmt</div>
          <div class="chip" id="b4-c8">Scheduling</div>
          <div class="chip" id="b4-c9">DevOps</div>
        </div>

        <div class="rule-divider" id="b4-rule"></div>

        <p class="sub-caption" id="b4-caption">
          Every tool your business uses,<br/>running on autopilot.
        </p>

      </div>

      <style>
        #beat-4 { background: #F8F6F1; }
      </style>

      <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });

        // Eyebrow
        tl.fromTo("#b4-eyebrow",
          { y: 8, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.35, ease: "power2.out" },
          0.15
        );

        // Headline
        tl.fromTo("#b4-headline",
          { y: 20, opacity: 0 },
          { y: 0,  opacity: 1, duration: 0.5, ease: "power3.out" },
          0.35
        );

        // 9 chips — waterfall stagger, scale 0.9→1, opacity 0→1, 0.08s between
        const chips = [
          "#b4-c1","#b4-c2","#b4-c3",
          "#b4-c4","#b4-c5","#b4-c6",
          "#b4-c7","#b4-c8","#b4-c9"
        ];

        chips.forEach((sel, i) => {
          tl.fromTo(sel,
            { scale: 0.9, opacity: 0 },
            { scale: 1.0, opacity: 1, duration: 0.25, ease: "back.out(1.4)" },
            0.75 + i * 0.08
          );
        });

        // Rule divider expands
        tl.fromTo("#b4-rule",
          { width: 0, opacity: 0 },
          { width: 60, opacity: 1, duration: 0.4, ease: "power2.out" },
          1.6
        );

        // Sub-caption
        tl.fromTo("#b4-caption",
          { y: 12, opacity: 0 },
          { y: 0,  opacity: 1, duration: 0.5, ease: "sine.out" },
          1.9
        );

        // Depth SVG washes in (decorative background layer)
        tl.fromTo("#b4-depth",
          { opacity: 0 },
          { opacity: 0.30, duration: 0.8, ease: "sine.out" },
          0.6
        );

        window.__timelines["beat-4"] = tl;
      </script>
    </div>
  </template>
</body>
</html>
