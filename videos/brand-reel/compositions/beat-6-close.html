<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    @font-face {
      font-family: "Fraunces";
      src: url("../capture/assets/fonts/fraunces-latin-opsz-normal.DihXLNYH.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: "Fraunces";
      src: url("../capture/assets/fonts/fraunces-latin-opsz-italic.lSdLDfvT.woff2") format("woff2");
      font-weight: 100 900;
      font-style: italic;
      font-display: block;
    }
    @font-face {
      font-family: "Inter";
      src: url("../capture/assets/fonts/inter-latin-standard-normal.BwkfbSeq.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    #beat-6 {
      background: #F8F6F1;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .scene-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 80px 60px;
      box-sizing: border-box;
      gap: 0;
    }

    .close-logo {
      width: 140px;
      height: auto;
      opacity: 0;
      margin-bottom: 56px;
    }

    .close-headline {
      text-align: center;
      margin-bottom: 36px;
    }

    .close-line1 {
      display: block;
      font-family: "Fraunces", serif;
      font-size: 52px;
      font-style: normal;
      font-variation-settings: 'wght' 400, 'opsz' 48;
      color: #0A0A0A;
      line-height: 1.1;
      opacity: 0;
    }

    .close-line2 {
      display: block;
      font-family: "Fraunces", serif;
      font-size: 52px;
      font-style: italic;
      font-variation-settings: 'wght' 400, 'opsz' 48;
      color: #0A0A0A;
      line-height: 1.1;
      opacity: 0;
    }

    .close-url {
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 13px;
      font-variation-settings: 'wght' 500;
      color: rgba(10,10,10,0.40);
      letter-spacing: 0.06em;
      margin-bottom: 24px;
      opacity: 0;
    }

    .close-cta {
      background: #0A0A0A;
      border-radius: 9999px;
      padding: 12px 24px;
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 13px;
      font-variation-settings: 'wght' 500;
      color: #F8F6F1;
      letter-spacing: 0.02em;
      opacity: 0;
    }
  </style>
</head>
<body>
  <template id="beat-6-template">
    <div data-composition-id="beat-6" data-start="0" data-duration="3.497" data-width="1080" data-height="1920">

      <div class="scene-content">

        <img
          class="close-logo"
          id="b6-logo"
          src="../capture/assets/svgs/logo-0.svg"
          alt="PURIST"
        />

        <div class="close-headline" id="b6-headline">
          <span class="close-line1" id="b6-line1">Your business</span>
          <span class="close-line2" id="b6-line2">runs itself.</span>
        </div>

        <p class="close-url" id="b6-url">purist.online</p>

        <div class="close-cta" id="b6-cta">Book a free audit →</div>

      </div>

      <style>
        #beat-6 { background: #F8F6F1; }
      </style>

      <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });

        // Logo fades up first (opacity targets 0.7 per spec)
        tl.fromTo("#b6-logo",
          { y: 16, opacity: 0 },
          { y: 0,  opacity: 0.7, duration: 0.7, ease: "power2.out" },
          0.1
        );

        // Headline line 1 — 0.2s delay after logo
        tl.fromTo("#b6-line1",
          { y: 16, opacity: 0 },
          { y: 0,  opacity: 1, duration: 0.7, ease: "power3.out" },
          0.3
        );

        // Headline line 2 — slight stagger
        tl.fromTo("#b6-line2",
          { y: 16, opacity: 0 },
          { y: 0,  opacity: 1, duration: 0.7, ease: "power3.out" },
          0.45
        );

        // URL — 0.5s delay after logo
        tl.fromTo("#b6-url",
          { y: 12, opacity: 0 },
          { y: 0,  opacity: 1, duration: 0.55, ease: "sine.out" },
          0.6
        );

        // CTA pill
        tl.fromTo("#b6-cta",
          { y: 12, opacity: 0, scale: 0.95 },
          { y: 0,  opacity: 1, scale: 1.0, duration: 0.5, ease: "back.out(1.3)" },
          0.75
        );

        // Hold static — entire beat holds with content fully visible from ~1.3s → 3.497s

        window.__timelines["beat-6"] = tl;
      </script>
    </div>
  </template>
</body>
</html>
