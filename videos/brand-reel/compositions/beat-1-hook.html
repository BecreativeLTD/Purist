<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    @font-face {
      font-family: "Fraunces";
      src: url("../capture/assets/fonts/fraunces-latin-opsz-normal.DihXLNYH.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: "Fraunces";
      src: url("../capture/assets/fonts/fraunces-latin-opsz-italic.lSdLDfvT.woff2") format("woff2");
      font-weight: 100 900;
      font-style: italic;
      font-display: block;
    }
    @font-face {
      font-family: "Inter";
      src: url("../capture/assets/fonts/inter-latin-standard-normal.BwkfbSeq.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    #beat-1 {
      background: #0A0A0A;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .scene-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 80px 60px;
      box-sizing: border-box;
      position: relative;
    }

    .bg-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 680px;
      height: 680px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,180,176,0.04) 0%, rgba(10,10,10,0) 70%);
      pointer-events: none;
    }

    .word-stage {
      position: relative;
      height: 100px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .swap-word {
      position: absolute;
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 52px;
      font-variation-settings: 'wght' 500;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: -0.01em;
      white-space: nowrap;
      opacity: 0;
    }

    .closing-line {
      font-family: "Fraunces", serif;
      font-size: 52px;
      font-style: italic;
      font-variation-settings: 'wght' 400, 'opsz' 48;
      color: #E8B4B0;
      letter-spacing: 0.02em;
      text-align: center;
      opacity: 0;
      line-height: 1.2;
      max-width: 780px;
    }

    .rule-accent {
      width: 0px;
      height: 1px;
      background: rgba(232,180,176,0.25);
      margin: 32px auto 0;
    }
  </style>
</head>
<body>
  <template id="beat-1-template">
    <div data-composition-id="beat-1" data-start="0" data-duration="7.76" data-width="1080" data-height="1920">

      <div class="scene-content">
        <div class="bg-glow" data-layout-ignore></div>

        <div class="word-stage">
          <span class="swap-word" id="w1">Scheduling</span>
          <span class="swap-word" id="w2">Invoicing</span>
          <span class="swap-word" id="w3">Lead capture</span>
          <span class="swap-word" id="w4">Reporting</span>
          <span class="swap-word" id="w5">Chasing</span>
        </div>

        <div class="rule-accent" id="beat1-rule"></div>

        <p class="closing-line" id="beat1-close">Still doing this manually?</p>
      </div>

      <style>
        #beat-1 { background: #0A0A0A; }
      </style>

      <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });

        // Word swap: enter 0.25s, hold 0.4s, exit 0.2s = 0.85s per word
        const words = ["#w1", "#w2", "#w3", "#w4", "#w5"];
        const enterDur = 0.25;
        const holdDur  = 0.4;
        const exitDur  = 0.2;
        const cycleDur = enterDur + holdDur + exitDur;

        words.forEach((sel, i) => {
          const t = 0.15 + i * cycleDur;
          // Enter: y+12→0, opacity 0→1
          tl.fromTo(sel,
            { y: 12, opacity: 0 },
            { y: 0,  opacity: 1, duration: enterDur, ease: "power3.out", overwrite: "auto" },
            t
          );
          // Exit: y 0→-12, opacity 1→0
          tl.fromTo(sel,
            { y: 0,  opacity: 1 },
            { y: -12, opacity: 0, duration: exitDur, ease: "power2.in", overwrite: "auto" },
            t + enterDur + holdDur
          );
        });

        // After words: accent rule + closing line
        const closeStart = 0.15 + words.length * cycleDur + 0.1;

        tl.fromTo("#beat1-rule",
          { width: 0, opacity: 0 },
          { width: 120, opacity: 1, duration: 0.4, ease: "power2.out" },
          closeStart
        );

        tl.fromTo("#beat1-close",
          { y: 16, opacity: 0 },
          { y: 0,  opacity: 1, duration: 0.6, ease: "power2.out" },
          closeStart + 0.15
        );

        window.__timelines["beat-1"] = tl;
      </script>
    </div>
  </template>
</body>
</html>
