<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    @font-face {
      font-family: "Fraunces";
      src: url("../capture/assets/fonts/fraunces-latin-opsz-normal.DihXLNYH.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: "Inter";
      src: url("../capture/assets/fonts/inter-latin-standard-normal.BwkfbSeq.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    #beat-5 {
      background: #0A0A0A;
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    .glow-pulse {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(74,222,128,0.08) 0%, rgba(10,10,10,0) 70%);
      pointer-events: none;
    }

    .scene-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 80px 60px;
      box-sizing: border-box;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    .roi-eyebrow {
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 10px;
      font-variation-settings: 'wght' 600;
      color: rgba(74,222,128,0.60);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 24px;
      opacity: 0;
    }

    .roi-counter {
      font-family: "Fraunces", serif;
      font-size: 140px;
      font-variation-settings: 'wght' 400, 'opsz' 144;
      color: #4ADE80;
      line-height: 1;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      margin-bottom: 16px;
      opacity: 0;
    }

    .roi-sub {
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 16px;
      font-variation-settings: 'wght' 400;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.01em;
      margin-bottom: 40px;
      opacity: 0;
    }

    .roi-rule {
      width: 0px;
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin-bottom: 24px;
    }

    .roi-deploy {
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 14px;
      font-variation-settings: 'wght' 500;
      color: rgba(232,180,176,0.80);
      letter-spacing: 0.01em;
      margin-bottom: 32px;
      opacity: 0;
    }

    .roi-badge {
      background: rgba(45,80,22,0.15);
      border: 1px solid rgba(45,80,22,0.25);
      border-radius: 9999px;
      padding: 6px 16px;
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 11px;
      font-variation-settings: 'wght' 500;
      color: #2D5016;
      letter-spacing: 0.02em;
      opacity: 0;
    }
  </style>
</head>
<body>
  <template id="beat-5-template">
    <div data-composition-id="beat-5" data-start="0" data-duration="9.7" data-width="1080" data-height="1920">

      <div class="glow-pulse" id="b5-glow" data-layout-ignore></div>

      <div class="scene-content">
        <p class="roi-eyebrow" id="b5-eyebrow">Average client result</p>

        <div class="roi-counter" id="b5-counter">0×</div>
        <p class="roi-sub" id="b5-sub">return on investment</p>

        <div class="roi-rule" id="b5-rule"></div>

        <p class="roi-deploy" id="b5-deploy">Deployed in 5–10 business days.</p>

        <div class="roi-badge" id="b5-badge">30-day money-back guarantee</div>
      </div>

      <style>
        #beat-5 { background: #0A0A0A; }
      </style>

      <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });
        const dur = 9.7;

        // Eyebrow
        tl.fromTo("#b5-eyebrow",
          { y: 8, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" },
          0.15
        );

        // Counter entrance: scale 0.92→1, opacity 0→1
        tl.fromTo("#b5-counter",
          { scale: 0.92, opacity: 0 },
          { scale: 1.0,  opacity: 1, duration: 0.6, ease: "back.out(1.2)" },
          0.35
        );

        // Counter value animation: 0 → 9.4 over 2s (separate object, no prop conflict)
        const roiObj = { val: 0 };
        tl.to(roiObj, {
          val: 9.4,
          duration: 2.0,
          ease: "power2.out",
          overwrite: "auto",
          onUpdate: function() {
            const el = document.getElementById("b5-counter");
            if (el) el.textContent = roiObj.val.toFixed(1) + "×";
          }
        }, 0.35);

        // ROI sub-label
        tl.fromTo("#b5-sub",
          { opacity: 0, y: 8 },
          { opacity: 1, y: 0, duration: 0.45, ease: "sine.out" },
          0.65
        );

        // Divider rule expands
        tl.fromTo("#b5-rule",
          { width: 0 },
          { width: 120, duration: 0.5, ease: "power2.out" },
          1.4
        );

        // Deploy line
        tl.fromTo("#b5-deploy",
          { y: 10, opacity: 0 },
          { y: 0,  opacity: 1, duration: 0.4, ease: "power2.out" },
          1.7
        );

        // Guarantee badge
        tl.fromTo("#b5-badge",
          { scale: 0.9, opacity: 0 },
          { scale: 1.0, opacity: 1, duration: 0.35, ease: "back.out(1.5)" },
          2.0
        );

        // Glow pulse — seekable on tl
        tl.fromTo("#b5-glow",
          { scale: 0.8, opacity: 0 },
          { scale: 1.0, opacity: 1, duration: 0.8, ease: "sine.out" },
          0.2
        );

        // Pulse loop — finite repeats calculated from duration
        const pulseDur = 1.2;
        const pulseStart = 1.0;
        const remaining = dur - pulseStart;
        const pulseCycles = Math.ceil(remaining / (pulseDur * 2)) - 1;
        tl.to("#b5-glow", {
          scale: 1.25,
          opacity: 0.7,
          yoyo: true,
          repeat: Math.max(pulseCycles, 1),
          duration: pulseDur,
          ease: "sine.inOut"
        }, pulseStart);

        window.__timelines["beat-5"] = tl;
      </script>
    </div>
  </template>
</body>
</html>
