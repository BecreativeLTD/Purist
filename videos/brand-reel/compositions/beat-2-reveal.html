<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    @font-face {
      font-family: "Fraunces";
      src: url("../capture/assets/fonts/fraunces-latin-opsz-normal.DihXLNYH.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: "Fraunces";
      src: url("../capture/assets/fonts/fraunces-latin-opsz-italic.lSdLDfvT.woff2") format("woff2");
      font-weight: 100 900;
      font-style: italic;
      font-display: block;
    }
    @font-face {
      font-family: "Inter";
      src: url("../capture/assets/fonts/inter-latin-standard-normal.BwkfbSeq.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    #beat-2 {
      background: #F8F6F1;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .scene-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 80px 60px;
      box-sizing: border-box;
      gap: 0;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      opacity: 0;
    }

    .logo-wrap img {
      width: 280px;
      height: auto;
    }

    .sub-labels {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 60px;
    }

    .sub-label {
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 18px;
      font-variation-settings: 'wght' 500;
      color: rgba(10,10,10,0.50);
      letter-spacing: 0.01em;
      opacity: 0;
    }

    .label-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(10,10,10,0.20);
      margin: 0 auto;
      opacity: 0;
    }

    .hero-illustration {
      width: 75%;
      max-width: 810px;
      height: auto;
      opacity: 0;
    }

    .eyebrow {
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 10px;
      font-variation-settings: 'wght' 600;
      color: rgba(10,10,10,0.35);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0;
    }
  </style>
</head>
<body>
  <template id="beat-2-template">
    <div data-composition-id="beat-2" data-start="0" data-duration="6.6" data-width="1080" data-height="1920">

      <div class="scene-content">
        <p class="eyebrow" id="b2-eyebrow">The solution</p>

        <div class="logo-wrap" id="b2-logo">
          <img src="../capture/assets/svgs/logo-0.svg" alt="PURIST" />
        </div>

        <div class="sub-labels">
          <span class="sub-label" id="b2-label1">Workflow Automation</span>
          <span class="label-dot" id="b2-dot"></span>
          <span class="sub-label" id="b2-label2">AI Agents</span>
        </div>

        <img
          class="hero-illustration"
          id="b2-hero"
          src="../capture/assets/your-business-runs-itself-you-focus-on-g.svg"
          alt="Your business runs itself"
        />
      </div>

      <style>
        #beat-2 { background: #F8F6F1; }
      </style>

      <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });

        // Eyebrow
        tl.fromTo("#b2-eyebrow",
          { y: 8, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" },
          0.15
        );

        // PURIST logo: scale 0.85 → 1.0, opacity 0 → 1
        tl.fromTo("#b2-logo",
          { scale: 0.85, opacity: 0 },
          { scale: 1.0,  opacity: 1, duration: 0.6, ease: "power3.out" },
          0.35
        );

        // Sub-label 1
        tl.fromTo("#b2-label1",
          { x: -16, opacity: 0 },
          { x: 0,   opacity: 1, duration: 0.45, ease: "expo.out" },
          0.85
        );

        // Dot separator
        tl.fromTo("#b2-dot",
          { scale: 0, opacity: 0 },
          { scale: 1,  opacity: 1, duration: 0.2, ease: "back.out(2)" },
          1.05
        );

        // Sub-label 2
        tl.fromTo("#b2-label2",
          { x: 16, opacity: 0 },
          { x: 0,  opacity: 1, duration: 0.45, ease: "expo.out" },
          1.15
        );

        // Hero illustration slides up from bottom
        tl.fromTo("#b2-hero",
          { y: 60, opacity: 0 },
          { y: 0,  opacity: 1, duration: 0.7, ease: "power2.out" },
          1.5
        );

        window.__timelines["beat-2"] = tl;
      </script>
    </div>
  </template>
</body>
</html>
