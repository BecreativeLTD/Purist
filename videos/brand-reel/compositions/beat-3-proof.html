<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    @font-face {
      font-family: "Fraunces";
      src: url("../capture/assets/fonts/fraunces-latin-opsz-normal.DihXLNYH.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: "Inter";
      src: url("../capture/assets/fonts/inter-latin-standard-normal.BwkfbSeq.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    #beat-3 {
      background: #0A0A0A;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .scene-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 80px 60px;
      box-sizing: border-box;
      gap: 24px;
    }

    .section-eyebrow {
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 10px;
      font-variation-settings: 'wght' 600;
      color: rgba(232,180,176,0.70);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0;
      align-self: flex-start;
    }

    .stat-cards {
      display: flex;
      flex-direction: column;
      width: 100%;
      gap: 20px;
    }

    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      opacity: 0;
    }

    .stat-number {
      font-family: "Fraunces", serif;
      font-size: 80px;
      font-variation-settings: 'wght' 400, 'opsz' 72;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .stat-number.white  { color: rgba(255,255,255,0.90); }
    .stat-number.rose   { color: #E8B4B0; }
    .stat-number.green  { color: #4ADE80; }

    .stat-label {
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 14px;
      font-variation-settings: 'wght' 400;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.01em;
    }

    /* ─── Ticker ─── */
    .ticker-wrap {
      width: 100%;
      overflow: hidden;
      padding: 16px 0;
      border-top: 1px solid rgba(255,255,255,0.06);
      opacity: 0;
    }

    .ticker-track {
      display: flex;
      align-items: center;
      gap: 32px;
      white-space: nowrap;
      will-change: transform;
    }

    .ticker-item {
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0.55;
      flex-shrink: 0;
    }

    .ticker-item img {
      height: 24px;
      width: auto;
    }

    .ticker-item span {
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 12px;
      font-variation-settings: 'wght' 500;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <template id="beat-3-template">
    <div data-composition-id="beat-3" data-start="0" data-duration="7.77" data-width="1080" data-height="1920">

      <div class="scene-content" id="b3-scene" style="visibility:hidden">

        <p class="section-eyebrow" id="b3-eyebrow">Social proof</p>

        <div class="stat-cards">
          <div class="stat-card" id="b3-card1">
            <div class="stat-number white" id="b3-num1">500+</div>
            <div class="stat-label">businesses automated</div>
          </div>

          <div class="stat-card" id="b3-card2">
            <div class="stat-number rose" id="b3-num2">14h</div>
            <div class="stat-label">saved per week, avg.</div>
          </div>

          <div class="stat-card" id="b3-card3">
            <div class="stat-number green" id="b3-num3">99.97%</div>
            <div class="stat-label">uptime SLA</div>
          </div>
        </div>

        <!-- Integration logo ticker — text labels only (avoids duplicate img nodes) -->
        <div class="ticker-wrap" id="b3-ticker">
          <div class="ticker-track" id="b3-track">
            <div class="ticker-item"><span>n8n</span></div>
            <div class="ticker-item"><span>Anthropic</span></div>
            <div class="ticker-item"><span>HubSpot</span></div>
            <div class="ticker-item"><span>Slack</span></div>
            <div class="ticker-item"><span>Stripe</span></div>
            <div class="ticker-item"><span>Shopify</span></div>
            <div class="ticker-item"><span>Notion</span></div>
            <div class="ticker-item"><span>·</span></div>
            <div class="ticker-item"><span>n8n</span></div>
            <div class="ticker-item"><span>Anthropic</span></div>
            <div class="ticker-item"><span>HubSpot</span></div>
            <div class="ticker-item"><span>Slack</span></div>
            <div class="ticker-item"><span>Stripe</span></div>
            <div class="ticker-item"><span>Shopify</span></div>
            <div class="ticker-item"><span>Notion</span></div>
            <div class="ticker-item"><span>·</span></div>
          </div>
        </div>

      </div>

      <style>
        #beat-3 { background: #0A0A0A; }
      </style>

      <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });
        const dur = 7.77;

        // Make scene visible at timeline start (before any entrance animations)
        tl.set("#b3-scene", { visibility: "visible" }, 0);

        // Eyebrow
        tl.fromTo("#b3-eyebrow",
          { x: -12, opacity: 0 },
          { x: 0,   opacity: 1, duration: 0.35, ease: "power2.out" },
          0.15
        );

        // Stat card 1
        tl.fromTo("#b3-card1",
          { y: 24, opacity: 0 },
          { y: 0,  opacity: 1, duration: 0.4, ease: "power3.out" },
          0.35
        );

        // Stat card 2 — stagger 0.25s
        tl.fromTo("#b3-card2",
          { y: 24, opacity: 0 },
          { y: 0,  opacity: 1, duration: 0.4, ease: "power3.out" },
          0.60
        );

        // Stat card 3 — stagger 0.25s
        tl.fromTo("#b3-card3",
          { y: 24, opacity: 0 },
          { y: 0,  opacity: 1, duration: 0.4, ease: "expo.out" },
          0.85
        );

        // Counter animations — sequential counters, no overlapping val property
        // Card 1: 500+ (starts at 0.35)
        const counter1 = { val: 0 };
        tl.to(counter1, {
          val: 500,
          duration: 1.5,
          ease: "power2.out",
          overwrite: "auto",
          onUpdate: function() {
            const el = document.getElementById("b3-num1");
            if (el) el.textContent = Math.round(counter1.val) + "+";
          }
        }, 0.35);

        // Card 2: 14h (starts at 0.60)
        const counter2 = { val: 0 };
        tl.to(counter2, {
          val: 14,
          duration: 1.2,
          ease: "power2.out",
          overwrite: "auto",
          onUpdate: function() {
            const el = document.getElementById("b3-num2");
            if (el) el.textContent = Math.round(counter2.val) + "h";
          }
        }, 0.60);

        // Card 3: 99.97% (starts at 0.85)
        const counter3 = { val: 0 };
        tl.to(counter3, {
          val: 99.97,
          duration: 1.8,
          ease: "power2.out",
          overwrite: "auto",
          onUpdate: function() {
            const el = document.getElementById("b3-num3");
            if (el) el.textContent = counter3.val.toFixed(2) + "%";
          }
        }, 0.85);

        // Ticker fades in
        tl.fromTo("#b3-ticker",
          { opacity: 0 },
          { opacity: 1, duration: 0.5, ease: "sine.out" },
          1.5
        );

        // Ticker scroll animation — attached to tl (seekable)
        // Duration of beat = 7.77s, ticker starts at 1.5s, runs ~6.27s
        // Translate -50% for seamless dual-copy loop
        const tickerDur = dur - 1.5;
        tl.fromTo("#b3-track",
          { x: 0 },
          { x: "-50%", duration: tickerDur, ease: "none" },
          1.5
        );

        window.__timelines["beat-3"] = tl;
      </script>
    </div>
  </template>
</body>
</html>
